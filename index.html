<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Premium</title>
    <style>
        :root { --bg: #0b091a; --card-bg: #161233; --text: #ffffff; --accent: #f80759; --border: #2a2456; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(11,9,26,0.9); backdrop-filter: blur(10px); position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.2rem; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .profile-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .img-container { width: 100%; padding-top: 140%; position: relative; }
        .img-container img { position: absolute; top:0; width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 10px; background: linear-gradient(transparent, black); position: absolute; bottom:0; width:100%; }

        /* MODAL / PROFILE VIEW */
        #profile-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--card-bg); border-radius: 20px; width: 100%; max-width: 400px; overflow: hidden; border: 1px solid var(--border); }
        .modal-img { width: 100%; height: 300px; object-fit: cover; }
        .modal-text { padding: 20px; }
        .btn-chat { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        /* CHAT VIEW */
        #chat-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 0.9rem; line-height: 1.4; }
        .ai { background: var(--card-bg); align-self: flex-start; border: 1px solid var(--border); }
        .user { background: var(--accent); align-self: flex-end; }
        .input-area { padding: 20px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
        input { flex: 1; background: #000; border: 1px solid var(--border); border-radius: 20px; padding: 12px; color: white; outline: none; }
    </style>
</head>
<body>

<header><div class="logo">CHATHUB.AI</div></header>

<div class="grid-container" id="grid"></div>

<div id="profile-modal">
    <div class="modal-content">
        <img id="m-img" class="modal-img">
        <div class="modal-text">
            <h2 id="m-name" style="margin:0"></h2>
            <p id="m-bio" style="color:#aaa"></p>
            <button class="btn-chat" onclick="goToChat()">Start Chatting</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#555; width:100%; margin-top:10px; cursor:pointer;">Maybe later</button>
        </div>
    </div>
</div>

<div id="chat-screen">
    <header>
        <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.2rem;">✕</button>
        <div id="chat-title" style="font-weight:bold"></div>
        <button onclick="clearChat()" style="background:none; border:none; color:var(--accent); font-size:0.7rem;">RESET</button>
    </header>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message...">
        <button onclick="send()" style="background:var(--accent); border:none; border-radius:50%; width:40px; height:40px; color:white">➔</button>
    </div>
</div>

<script>
    const characters = [
        { id: 1, name: "Sakura 🌸", bio: "22yo. Loves oil painting and spring mornings.", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500", greeting: "Hey! I'm just working on a new canvas. What's your favorite color?" },
        { id: 2, name: "Luna 🎮", bio: "Pro RPG player. Hates lag, loves energy drinks.", photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=500", greeting: "Gg. Hope you aren't here to waste my time. Rank?" },
        { id: 3, name: "Elena 📚", bio: "Philosophy student. Searching for the meaning of life.", photo: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500", greeting: "I was just thinking about the stars. Do you ever feel small?" },
        { id: 4, name: "Jax 🏋️", bio: "Elite Coach. No days off. Let's get to work.", photo: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=500", greeting: "CHAMP! WHY ARE YOU ON YOUR PHONE? DID YOU HIT YOUR REPS?" }
    ];

    let current = null;

    function init() {
        document.getElementById('grid').innerHTML = characters.map(c => `
            <div class="profile-card" onclick="openModal(${c.id})">
                <div class="img-container"><img src="${c.photo}"></div>
                <div class="card-info"><b>${c.name}</b></div>
            </div>`).join('');
    }

    function openModal(id) {
        current = characters.find(c => c.id === id);
        document.getElementById('m-name').innerText = current.name;
        document.getElementById('m-bio').innerText = current.bio;
        document.getElementById('m-img').src = current.photo;
        document.getElementById('profile-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('profile-modal').style.display = 'none'; }

    function goToChat() {
        closeModal();
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = current.name;
        loadHistory();
    }

    function closeChat() { document.getElementById('chat-screen').style.display = 'none'; }

    // OPTION C: LOCAL STORAGE (PERMANENT MEMORY)
    function loadHistory() {
        const saved = localStorage.getItem('chat_' + current.id);
        const msgDiv = document.getElementById('messages');
        if (saved) {
            const history = JSON.parse(saved);
            msgDiv.innerHTML = history.map(m => `<div class="msg ${m.role === 'user' ? 'user' : 'ai'}">${m.content}</div>`).join('');
        } else {
            msgDiv.innerHTML = `<div class="msg ai">${current.greeting}</div>`;
        }
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    function clearChat() {
        localStorage.removeItem('chat_' + current.id);
        loadHistory();
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        
        // Save user message to local history
        saveToLocal('user', text);

        const typingId = "t-" + Date.now();
        msgDiv.innerHTML += `<div class="msg ai" id="${typingId}">...</div>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;

        try {
            const history = JSON.parse(localStorage.getItem('chat_' + current.id) || "[]");
            const response = await fetch("/api/chat.mjs", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ character: current.name, bio: current.bio, message: text, history: history })
            });
            const data = await response.json();
            document.getElementById(typingId).remove();
            msgDiv.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            saveToLocal('assistant', data.reply);
        } catch (e) { document.getElementById(typingId).innerText = "Error!"; }
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    function saveToLocal(role, content) {
        const key = 'chat_' + current.id;
        const history = JSON.parse(localStorage.getItem(key) || "[]");
        history.push({ role, content });
        localStorage.setItem(key, JSON.stringify(history));
    }

    init();
</script>
</body>
</html>
