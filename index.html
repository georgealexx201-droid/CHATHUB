<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Private Platform</title>
    <style>
        :root { --bg: #05040a; --card: #0f0d1f; --text: #ffffff; --accent: #f80759; --border: #1f1b3d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Layout Components */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5, 4, 10, 0.9); backdrop-filter: blur(15px); position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.2rem; cursor: pointer; }
        .energy-pill { background: rgba(248, 7, 89, 0.1); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: var(--accent); font-weight: bold; display: flex; align-items: center; gap: 8px; }

        .main-content { padding: 25px; max-width: 1200px; margin: 0 auto; min-height: 100vh; }
        .search-container { margin-bottom: 25px; display: flex; gap: 10px; }
        #search { background: var(--card); border: 1px solid var(--border); color: white; padding: 12px 20px; border-radius: 12px; flex: 1; outline: none; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; height: 280px; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-meta { padding: 15px 10px; background: linear-gradient(transparent, #000); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        .card-mood { position: absolute; top: 10px; right: 10px; background: var(--accent); font-size: 0.6rem; padding: 3px 8px; border-radius: 5px; font-weight: bold; }

        /* Full Dashboard View */
        #chat-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; }
        .chat-layout { display: flex; height: 100%; width: 100%; max-width: 1300px; margin: 0 auto; }

        /* Left Sidebar (Big Profile) */
        .sidebar { width: 400px; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 30px; align-items: center; overflow-y: auto; background: var(--card); }
        .big-photo { width: 280px; height: 280px; border-radius: 30px; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 25px; box-shadow: 0 0 30px rgba(248, 7, 89, 0.2); }
        
        /* Middle (Phone Chat) */
        .chat-main { flex: 1; max-width: 480px; display: flex; flex-direction: column; background: #080712; border-left: 1px solid var(--border); border-right: 1px solid var(--border); position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; line-height: 1.5; }
        .ai { background: var(--card); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Typing Dots */
        .typing { display: flex; gap: 5px; padding: 10px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: blink 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2) translateY(-3px); } }

        /* Input area */
        .input-box { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        #userInput { flex: 1; background: #16142e; border: 1px solid var(--border); border-radius: 25px; padding: 12px 20px; color: white; outline: none; }

        /* Tabs & Gallery */
        .tabs { display: flex; width: 100%; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-size: 0.75rem; font-weight: bold; color: #555; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .gal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }

        /* Admin Section */
        .admin-panel { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 15px; margin-top: 50px; max-width: 600px; margin-left: auto; margin-right: auto; }
        .admin-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; margin-bottom: 10px; border-radius: 8px; box-sizing: border-box; }

        #shop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        
        @media (max-width: 900px) { .sidebar { display: none; } }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">CHATHUB.AI</div>
    <div class="energy-pill">
        <span id="energy-txt">⚡ 10 ENERGY</span>
        <button onclick="openShop()" style="background:var(--accent); border:none; color:white; width:22px; height:22px; border-radius:50%; cursor:pointer; font-weight:bold;">+</button>
    </div>
</header>

<div class="main-content" id="main-view">
    <div class="search-container">
        <input type="text" id="search" placeholder="Search your ideal companion..." oninput="renderGrid()">
    </div>
    <div class="grid" id="char-grid"></div>

    <div class="admin-panel">
        <h3 style="margin-top:0; color:var(--accent);">👑 Admin: Add New Girl</h3>
        <input type="text" id="newName" class="admin-input" placeholder="Name (e.g. Mia 🐯)">
        <input type="text" id="newMood" class="admin-input" placeholder="Mood (e.g. NAUGHTY 🔥)">
        <input type="text" id="newPhoto" class="admin-input" placeholder="Public Photo URL">
        <textarea id="newBio" class="admin-input" placeholder="Bio/Instructions"></textarea>
        <button onclick="adminAdd()" style="background:var(--accent); color:white; border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;">Create Character</button>
    </div>
</div>

<div id="chat-view">
    <div class="chat-layout">
        <div class="sidebar">
            <img id="side-photo" class="big-photo">
            <h2 id="side-name" style="margin:0"></h2>
            <div id="side-mood" style="background:linear-gradient(90deg, #ff00cc, #3333ff); padding:8px 20px; border-radius:10px; font-size:0.8rem; font-weight:bold; margin:20px 0; width:100%; text-align:center;"></div>
            <div class="tabs">
                <div id="t-prof" class="tab active" onclick="setTab('p')">PROFILE</div>
                <div id="t-gal" class="tab" onclick="setTab('g')">PHOTOS</div>
            </div>
            <div id="side-data" style="font-size: 0.9rem; color: #aaa; text-align: center; line-height: 1.6;"></div>
        </div>

        <div class="chat-main">
            <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">✕</button>
                <div id="header-name" style="font-weight:bold; margin-top:5px;"></div>
                <div style="width:24px;"></div>
            </div>
            <div id="messages"></div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Message..." autocomplete="off">
                <button onclick="send()" style="background:var(--accent); border:none; color:white; width:45px; height:45px; border-radius:50%; cursor:pointer; font-weight:bold;">➔</button>
            </div>
        </div>
    </div>
</div>

<div id="shop">
    <div style="background:var(--card); padding:30px; border-radius:20px; text-align:center; border:1px solid var(--border);">
        <h2 style="color:var(--accent)">Refill Energy</h2>
        <button onclick="buy(50)" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; width:100%; margin:5px 0; border-radius:10px; cursor:pointer;">⚡ 50 Energy - $4.99</button>
        <button onclick="buy(200)" style="background:var(--bg); color:white; border:1px solid var(--border); padding:12px; width:100%; margin:5px 0; border-radius:10px; cursor:pointer; border-color:var(--accent)">⚡ 200 Energy - $14.99</button>
        <button onclick="document.getElementById('shop').style.display='none'" style="background:none; border:none; color:#555; margin-top:10px; cursor:pointer;">Close</button>
    </div>
</div>

<script>
    // Initial Database
    let characters = JSON.parse(localStorage.getItem('my_girls')) || [
        { id: 1, name: "Sakura 🌸", mood: "FRISKY 🔥", bio: "The artist with a secret submissive side.", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600", greeting: "I was just getting lonely... come closer?" },
        { id: 2, name: "Luna 🎮", mood: "DOMINANT 😈", bio: "High stakes gamer. Play your cards right and I'll reward you.", photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=600", greeting: "Gg. Ready for the real game to start?" }
    ];

    let current = null;
    let energy = localStorage.getItem('energy') || 10;

    function renderGrid() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = characters.filter(c => c.name.toLowerCase().includes(q));
        document.getElementById('char-grid').innerHTML = filtered.map(c => `
            <div class="card" onclick="openChat(${c.id})">
                <div class="card-mood">${c.mood}</div>
                <img src="${c.photo}">
                <div class="card-meta"><b>${c.name}</b></div>
            </div>`).join('');
    }

    function adminAdd() {
        const n = document.getElementById('newName').value;
        const m = document.getElementById('newMood').value;
        const p = document.getElementById('newPhoto').value;
        const b = document.getElementById('newBio').value;
        if(!n || !p) return alert("Name and Photo required!");

        const newGirl = { id: Date.now(), name: n, mood: m, photo: p, bio: b, greeting: "Finally, you found me..." };
        characters.push(newGirl);
        localStorage.setItem('my_girls', JSON.stringify(characters));
        renderGrid();
        alert("New Girl Added to Empire!");
    }

    function openChat(id) {
        current = characters.find(c => c.id === id);
        document.getElementById('side-photo').src = current.photo;
        document.getElementById('side-name').innerText = current.name;
        document.getElementById('header-name').innerText = current.name;
        document.getElementById('side-mood').innerText = current.mood;
        document.getElementById('chat-view').style.display = 'block';
        setTab('p');
        loadMessages();
    }

    function setTab(t) {
        document.getElementById('t-prof').className = t==='p'?'tab active':'tab';
        document.getElementById('t-gal').className = t==='g'?'tab active':'tab';
        const content = document.getElementById('side-data');
        if(t === 'p') {
            content.innerHTML = `<p>${current.bio}</p>`;
        } else {
            content.innerHTML = `<div class="gal-grid">
                <div style="height:120px; background:#000; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;" onclick="unlockGal()">
                    <span style="font-size:1.5rem">🔒</span>
                    <span style="font-size:0.7rem; color:var(--accent); font-weight:bold; margin-top:5px;">Unlock Private - 100⚡</span>
                </div>
            </div>`;
        }
    }

    function loadMessages() {
        const h = JSON.parse(localStorage.getItem('h_'+current.id) || "[]");
        const box = document.getElementById('messages');
        box.innerHTML = h.length ? h.map(m => `<div class="msg ${m.role==='user'?'user':'ai'}">${m.content}</div>`).join('') : `<div class="msg ai">${current.greeting}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if(!val || energy <= 0) { if(energy<=0) openShop(); return; }

        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg user">${val}</div>`;
        input.value = '';
        saveLocal('user', val);

        const tid = "dots-" + Date.now();
        box.innerHTML += `<div class="msg ai" id="${tid}"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
        box.scrollTop = box.scrollHeight;

        try {
            const h = JSON.parse(localStorage.getItem('h_'+current.id) || "[]");
            const res = await fetch("/api/chat.mjs", {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ character: current.name, bio: current.bio, message: val, history: h })
            });
            const data = await res.json();
            document.getElementById(tid).remove();
            
            const aiMsg = document.createElement('div');
            aiMsg.className = 'msg ai';
            box.appendChild(aiMsg);
            
            let i = 0;
            function type() {
                if (i < data.reply.length) {
                    aiMsg.innerHTML += data.reply.charAt(i);
                    i++; box.scrollTop = box.scrollHeight;
                    setTimeout(type, 20);
                } else { saveLocal('assistant', data.reply); }
            }
            type();
            energy--;
            updateEnergy();
        } catch (e) { document.getElementById(tid).innerText = "Connection lost..."; }
    }

    function updateEnergy() {
        document.getElementById('energy-txt').innerText = `⚡ ${energy} ENERGY`;
        localStorage.setItem('energy', energy);
    }

    function unlockGal() {
        if(energy >= 100) { energy -= 100; updateEnergy(); alert("Private Photo Unlocked (Simulation)"); }
        else { alert("Not enough energy!"); openShop(); }
    }

    function saveLocal(role, content) {
        const h = JSON.parse(localStorage.getItem('h_'+current.id) || "[]");
        h.push({role, content});
        localStorage.setItem('h_'+current.id, JSON.stringify(h));
    }

    function openShop() { document.getElementById('shop').style.display = 'flex'; }
    function buy(n) { energy = parseInt(energy) + n; updateEnergy(); document.getElementById('shop').style.display='none'; }
    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }
    document.getElementById('userInput').addEventListener('keydown', (e) => { if(e.key==='Enter') send(); });

    renderGrid();
    updateEnergy();
</script>
</body>
</html>
