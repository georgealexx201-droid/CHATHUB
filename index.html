<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Empire Edition</title>
    <style>
        :root { --bg: #05040a; --card: #0f0d1f; --text: #ffffff; --accent: #f80759; --border: #1f1b3d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5, 4, 10, 0.9); backdrop-filter: blur(15px); }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.2rem; }
        .energy-pill { border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: var(--accent); }
        .grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; height: 85vh; overflow-y: auto; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; height: 280px; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: scale(1.02); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        #chat-view { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; }
        .chat-layout { display: flex; height: 100%; }
        .sidebar { width: 300px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; align-items: center; background: var(--card); }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #080712; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; }
        .ai { background: var(--card); align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }
        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; background: #16142e; border: 1px solid var(--border); padding: 12px 20px; color: white; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">CHATHUB.AI</div>
    <div class="energy-pill" id="energy-txt">⚡ 10 ENERGY</div>
</header>

<div class="grid" id="char-grid"></div>

<div id="chat-view">
    <div class="chat-layout">
        <div class="sidebar">
            <button onclick="closeChat()" style="align-self: flex-start; background: none; border: none; color: white; cursor: pointer; font-size: 1rem;">✕ Exit</button>
            <img id="side-photo" style="width: 220px; height: 220px; border-radius: 20px; object-fit: cover; margin-top: 30px; border: 2px solid var(--accent);">
            <h2 id="side-name" style="margin: 20px 0 5px 0;"></h2>
            <p id="side-bio" style="font-size: 0.85rem; color: #888; text-align: center; padding: 0 10px;"></p>
        </div>
        <div class="chat-main">
            <div style="padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                <span id="chat-title" style="font-weight: bold;"></span>
                <select id="vibe-select" style="background:#16142e; color:var(--accent); border:1px solid var(--accent); padding:5px 10px; border-radius:10px; outline:none; cursor:pointer;">
                    <option value="Romantic">💖 Romantic</option>
                    <option value="Naughty" selected>😈 Naughty</option>
                    <option value="Aggressive">🔥 Aggressive</option>
                    <option value="Angry">💢 Angry</option>
                </select>
            </div>
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Send a message..." autocomplete="off">
                <button onclick="send()" style="background: var(--accent); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem;">➔</button>
            </div>
        </div>
    </div>
</div>

<script>
    let energy = 10;
    let characters = [
        { id: 1, name: "Sakura 🌸", bio: "Forbidden artist who loves a challenge.", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400" },
        { id: 2, name: "Luna 🎮", bio: "Gamer girl. If you win, you get a prize.", photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=400" },
        { id: 3, name: "Elena 📚", bio: "Smart, sophisticated, and very strict.", photo: "https://images.unsplash.com/photo-1524250502761-1ac6f2e30d43?w=400" }
    ];
    let current = null;

    function render() {
        document.getElementById('char-grid').innerHTML = characters.map(c => `
            <div class="card" onclick="openChat(${c.id})">
                <img src="${c.photo}">
                <div style="position:absolute; bottom:0; width:100%; padding:15px; background:linear-gradient(transparent, #000); font-weight:bold;">
                    ${c.name}
                </div>
            </div>`).join('');
    }

    function openChat(id) {
        current = characters.find(c => c.id == id);
        document.getElementById('side-photo').src = current.photo;
        document.getElementById('side-name').innerText = current.name;
        document.getElementById('side-bio').innerText = current.bio;
        document.getElementById('chat-title').innerText = current.name;
        document.getElementById('chat-view').style.display = 'block';
        document.getElementById('messages').innerHTML = `<div class="msg ai">I've been waiting for you... what took so long?</div>`;
    }

    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        const vibe = document.getElementById('vibe-select').value;
        if(!text || energy <= 0) return;

        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ character: current.name, message: text, bio: current.bio, vibe: vibe })
            });
            const data = await res.json();
            box.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            energy--;
            document.getElementById('energy-txt').innerText = `⚡ ${energy} ENERGY`;
        } catch (e) {
            box.innerHTML += `<div class="msg ai" style="color:#ff4d4d">Connection Error. Check Vercel logs!</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    render();
</script>
</body>
</html>
