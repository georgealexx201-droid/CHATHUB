<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PersonaHub AI</title>
    <style>
        :root {
            --bg-color: #FAFAFA;
            --header-bg: #FFFFFF;
            --text-main: #262626;
            --text-secondary: #8E8E8E;
            --primary-accent: #0095F6;
            --bubble-user: #EFEFEF;
            --bubble-ai: #0095F6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column;
        }

        header {
            background-color: var(--header-bg);
            border-bottom: 1px solid #DBDBDB;
            padding: 10px 20px;
            text-align: center;
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }

        header h1 { margin: 0; font-size: 1.5rem; font-weight: 600; font-style: italic; }
        .back-btn { display: none; background: none; border: none; color: var(--primary-accent); font-weight: bold; cursor: pointer; font-size: 1rem; }

        .screen { display: none; flex: 1; flex-direction: column; }
        .active-screen { display: flex; }

        #profile-grid { padding: 20px; max-width: 935px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        .profile-card {
            background: var(--header-bg); border: 1px solid #DBDBDB; border-radius: 8px;
            overflow: hidden; cursor: pointer; transition: transform 0.2s;
            text-align: center; display: flex; flex-direction: column; align-items: center; padding-bottom: 10px;
        }
        .profile-card:hover { transform: translateY(-3px); }
        .profile-image-container { width: 100%; padding-top: 100%; position: relative; background-color: #f0f0f0; }
        .profile-card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .profile-card h3 { margin: 10px 0 5px; font-size: 1rem; }
        .profile-card p { margin: 0; font-size: 0.8rem; color: var(--text-secondary); }

        #chat-interface { display: flex; justify-content: center; align-items: center; height: calc(100vh - 60px); }
        #chat-container {
            width: 95%; max-width: 500px; background: var(--header-bg);
            border: 1px solid #DBDBDB; border-radius: 12px;
            display: flex; flex-direction: column; height: 85vh; overflow: hidden;
        }

        #active-chat-header { padding: 10px; border-bottom: 1px solid #DBDBDB; display: flex; align-items: center; gap: 10px; font-weight: 600; }
        #active-chat-header img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #eee; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; }
        .user { align-self: flex-end; background-color: var(--bubble-user); color: #000; }
        .ai { align-self: flex-start; background-color: var(--bubble-ai); color: #fff; }

        #input-area { display: flex; padding: 15px; border-top: 1px solid #DBDBDB; background: var(--header-bg); }
        #userInput { flex: 1; border: 1px solid #DBDBDB; border-radius: 20px; padding: 10px 15px; outline: none; }
        #sendBtn { background: none; border: none; color: var(--primary-accent); font-weight: 600; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <button class="back-btn" id="backBtn" onclick="showGrid()">← Back</button>
    <h1 id="mainTitle">PersonaHub</h1>
    <div style="width: 50px;"></div> 
</header>

<div id="grid-screen" class="screen active-screen">
    <div id="profile-grid">
        <div class="grid-container" id="gridContainer"></div>
    </div>
</div>

<div id="chat-screen" class="screen">
    <div id="chat-interface">
        <div id="chat-container">
            <div id="active-chat-header">
                <img src="" id="activeAiPhoto">
                <span id="activeAiName"></span>
            </div>
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="userInput" placeholder="Message...">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. DATA
    const aiCharacters = [
        { id: 1, name: "Sakura", type: "Artist", bio: "You are Sakura, a bubbly artist who loves anime and cherry blossoms.", photo: "https://api.dicebear.com/8.x/avataaars/svg?seed=Sakura" },
        { id: 2, name: "Luna", type: "Gamer", bio: "You are Luna, a cool, slightly sarcastic competitive gamer girl.", photo: "https://api.dicebear.com/8.x/avataaars/svg?seed=Luna" },
        { id: 3, name: "Maya", type: "Librarian", bio: "You are Maya, a quiet, intellectual girl who loves classic literature.", photo: "https://api.dicebear.com/8.x/avataaars/svg?seed=Maya" }
    ];

    let currentAi = null;

    // 2. SET UP GRID
    function loadGrid() {
        const container = document.getElementById('gridContainer');
        container.innerHTML = '';
        aiCharacters.forEach(char => {
            container.innerHTML += `
                <div class="profile-card" onclick="startChat(${char.id})">
                    <div class="profile-image-container"><img src="${char.photo}"></div>
                    <h3>${char.name}</h3>
                    <p>${char.type}</p>
                </div>`;
        });
    }

    function startChat(aiId) {
        currentAi = aiCharacters.find(c => c.id === aiId);
        document.getElementById('activeAiPhoto').src = currentAi.photo;
        document.getElementById('activeAiName').textContent = currentAi.name;
        document.getElementById('messages').innerHTML = `<div class="msg ai">Hi! I'm ${currentAi.name}. What's on your mind?</div>`;
        
        document.getElementById('grid-screen').classList.remove('active-screen');
        document.getElementById('chat-screen').classList.add('active-screen');
        document.getElementById('backBtn').style.display = 'block';
    }

    function showGrid() {
        document.getElementById('grid-screen').classList.add('active-screen');
        document.getElementById('chat-screen').classList.remove('active-screen');
        document.getElementById('backBtn').style.display = 'none';
    }

    // 3. BRAIN (API CONNECTION)
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const msgDiv = document.getElementById('messages');
        const text = input.value.trim();
        
        if (!text) return;

        // User message
        msgDiv.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        msgDiv.scrollTop = msgDiv.scrollHeight;

        // PUT YOUR KEY HERE!
        const MY_API_KEY = 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; 

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${MY_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": "google/gemini-2.0-flash-lite-preview-02-05:free",
                    "messages": [
                        {"role": "system", "content": currentAi.bio},
                        {"role": "user", "content": text}
                    ]
                })
            });

            const data = await response.json();
            const aiResponse = data.choices[0].message.content;

            msgDiv.innerHTML += `<div class="msg ai">${aiResponse}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;

        } catch (error) {
            msgDiv.innerHTML += `<div class="msg ai">I'm having trouble thinking... did you add your API key correctly?</div>`;
        }
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    loadGrid();
</script>

</body>
</html>
