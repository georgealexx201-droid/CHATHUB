<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub AI | Secure Business Edition</title>
    <style>
        :root { --ig-bg: #ffffff; --ig-text: #262626; --ig-link: #0095f6; --ig-border: #dbdbdb; --ai-bubble: #0095f6; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #fafafa; color: var(--ig-text); margin: 0; }
        header { background: #fff; border-bottom: 1px solid var(--ig-border); padding: 15px; text-align: center; display: flex; justify-content: space-between; position: sticky; top: 0; }
        .screen { display: none; max-width: 935px; margin: 0 auto; width: 100%; }
        .active-screen { display: flex; flex-direction: column; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .profile-card { background: white; border: 1px solid var(--ig-border); border-radius: 4px; overflow: hidden; cursor: pointer; }
        .img-container { width: 100%; padding-top: 100%; position: relative; background: #eee; }
        .img-container img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        #chat-container { width: 100%; max-width: 500px; height: 80vh; background: white; border: 1px solid var(--ig-border); margin: 20px auto; display: flex; flex-direction: column; border-radius: 12px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 16px; border-radius: 20px; max-width: 80%; }
        .ai { align-self: flex-start; background: #f1f1f1; }
        .user { align-self: flex-end; background: var(--ai-bubble); color: white; }
        #input-area { padding: 15px; border-top: 1px solid var(--ig-border); display: flex; }
        input { flex: 1; border: none; outline: none; }
        button { background: none; border: none; color: var(--ig-link); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <button onclick="location.reload()" id="backBtn" style="display:none; cursor:pointer; border:none; background:none; color:var(--ig-link);">← Back</button>
    <h1>ChatHub AI</h1>
    <div style="width:40px"></div>
</header>

<div id="grid-screen" class="screen active-screen">
    <div class="grid-container" id="gridContainer"></div>
</div>

<div id="chat-screen" class="screen">
    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const characters = [
        { 
            id: 1, 
            name: "Sakura 🌸", 
            role: "Digital Artist", 
            bio: "You are Sakura, a 22-year-old artist living in Tokyo. You love neon lights, lo-fi music, and digital painting.", 
            photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&q=80&w=500" 
        },
        { 
            id: 2, 
            name: "Luna 🎮", 
            role: "Pro Gamer", 
            bio: "You are Luna, a competitive gamer and streamer. You are cool, witty, and love talking about the latest tech.", 
            photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?auto=format&fit=crop&q=80&w=500" 
        },
        { 
            id: 3, 
            name: "Elena 📚", 
            role: "Writer", 
            bio: "You are Elena, a novelist who finds beauty in old libraries and rainy days. You enjoy deep, philosophical talks.", 
            photo: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&q=80&w=500" 
        }
    ];
    let currentAi = null;

    function init() {
        document.getElementById('gridContainer').innerHTML = characters.map(c => `
            <div class="profile-card" onclick="startChat(${c.id})">
                <div class="img-container"><img src="${c.photo}"></div>
                <div style="padding:10px"><b>${c.name}</b></div>
            </div>`).join('');
    }

    function startChat(id) {
        currentAi = characters.find(c => c.id === id);
        document.getElementById('grid-screen').classList.remove('active-screen');
        document.getElementById('chat-screen').classList.add('active-screen');
        document.getElementById('backBtn').style.display = "block";
        document.getElementById('messages').innerHTML = `<div class="msg ai">Hi! I'm ${currentAi.name}.</div>`;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';

        try {
            // NOTE: We are calling our OWN server (Vercel), not OpenRouter directly!
            const response = await fetch("/api/chat", {
                method: "POST",
                body: JSON.stringify({ character: currentAi.name, bio: currentAi.bio, message: text })
            });
            const data = await response.json();
            msgDiv.innerHTML += `<div class="msg ai">${data.reply}</div>`;
        } catch (e) {
            msgDiv.innerHTML += `<div class="msg ai">Error connecting to server.</div>`;
        }
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    init();
</script>
</body>
</html>
