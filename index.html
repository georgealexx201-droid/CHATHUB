<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Private Companion</title>
    <style>
        :root { --bg: #070514; --card: #120e2e; --text: #ffffff; --accent: #f80759; --border: #251f4d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        
        /* Header */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(7, 5, 20, 0.9); backdrop-filter: blur(10px); position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.3rem; cursor: pointer; }
        #energy-display { background: rgba(248, 7, 89, 0.1); border: 1px solid var(--accent); padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; color: var(--accent); }

        /* Discovery Grid */
        .main-content { height: calc(100vh - 70px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .filter-btn { background: var(--card); border: 1px solid var(--border); color: #888; padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; overflow: hidden; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 260px; object-fit: cover; }
        .card-meta { padding: 12px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); position: absolute; bottom:0; width: 100%; box-sizing: border-box; }

        /* Chat Dashboard View */
        #chat-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; }
        .chat-layout { display: flex; width: 100%; height: 100%; }
        
        .chat-main { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: #0a081d; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 75%; font-size: 0.95rem; line-height: 1.5; }
        .ai { background: var(--card); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }

        .input-box { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--bg); }
        input[type="text"] { flex: 1; background: #000; border: 1px solid var(--border); border-radius: 25px; padding: 14px 20px; color: white; outline: none; }

        /* Sidebar & Gallery */
        .chat-sidebar { width: 320px; display: flex; flex-direction: column; background: var(--card); border-left: 1px solid var(--border); }
        .sidebar-scroll { padding: 25px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .side-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 15px; }
        
        .tab-container { display: flex; width: 100%; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 0.75rem; font-weight: bold; color: #666; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .gallery-item { position: relative; border-radius: 10px; overflow: hidden; height: 110px; background: #000; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .locked { filter: blur(10px) grayscale(1); opacity: 0.4; }
        .lock-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.2rem; text-shadow: 0 0 10px black; }

        .mood-badge { background: linear-gradient(90deg, #ff00cc, #3333ff); padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; margin-bottom: 10px; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .tag { background: var(--border); padding: 4px 10px; border-radius: 12px; font-size: 0.65rem; color: #bbb; }

        @media (max-width: 850px) { .chat-sidebar { display: none; } }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">CHATHUB.AI</div>
    <div id="energy-display">⚡ 10 ENERGY</div>
</header>

<div class="main-content" id="main-grid">
    <div class="filter-bar">
        <button class="filter-btn active" onclick="setCat('All', this)">All</button>
        <button class="filter-btn" onclick="setCat('Spicy', this)">Spicy 🔥</button>
        <button class="filter-btn" onclick="setCat('Gaming', this)">Gaming</button>
    </div>
    <div class="grid" id="char-grid"></div>
</div>

<div id="chat-view">
    <div class="chat-layout">
        <div class="chat-main">
            <div class="chat-header">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">✕</button>
                <div id="chat-name-top" style="font-weight:bold;"></div>
                <button onclick="resetChat()" style="background:none; border:none; color:var(--accent); font-size:0.7rem; cursor:pointer;">RESET</button>
            </div>
            <div id="messages"></div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Type a message...">
                <button onclick="sendMsg()" style="background:var(--accent); border:none; color:white; padding:10px 20px; border-radius:25px; font-weight:bold; cursor:pointer;">Send</button>
            </div>
        </div>

        <div class="chat-sidebar">
            <div class="sidebar-scroll">
                <img id="side-photo" class="side-img">
                <h2 id="side-name" style="margin:0; font-size: 1.2rem;"></h2>
                <div class="tab-container">
                    <div id="tab-prof" class="tab active" onclick="showTab('profile')">PROFILE</div>
                    <div id="tab-gal" class="tab" onclick="showTab('gallery')">PHOTOS</div>
                </div>
                <div id="side-content" style="width:100%"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const characters = [
        { 
            id: 1, name: "Sakura 🌸", cat: "Spicy", country: "Japan 🇯🇵", bio: "Artist by day, adventurous by night. She loves exploring fantasies.", 
            tags: ["Submissive", "Creative"], mood: "FRISKY 🔥", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500",
            greeting: "I was just getting ready for bed... I'm feeling lonely. Stay with me?",
            gallery: [
                { url: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=300", locked: false },
                { url: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=300", locked: true },
                { url: "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=300", locked: true }
            ]
        },
        { 
            id: 2, name: "Luna 🎮", cat: "Gaming", country: "S. Korea 🇰🇷", bio: "Dominant gamer girl. She wants a player who can actually keep up.", 
            tags: ["Dominant", "Gamer"], mood: "PLAYFUL 😈", photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=500",
            greeting: "Just won my match. I'm energized... want to see how I celebrate?",
            gallery: [
                { url: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=300", locked: false },
                { url: "https://images.unsplash.com/photo-1603349206295-dde20617cb6a?w=300", locked: true }
            ]
        }
    ];

    let current = null;
    let category = "All";
    let energy = localStorage.getItem('energy') ? parseInt(localStorage.getItem('energy')) : 10;

    function updateEnergy() {
        document.getElementById('energy-display').innerText = `⚡ ${energy} ENERGY`;
        localStorage.setItem('energy', energy);
    }

    function renderGrid() {
        const filtered = characters.filter(c => (category === "All" || c.cat === category));
        document.getElementById('char-grid').innerHTML = filtered.map(c => `
            <div class="card" onclick="openChat(${c.id})">
                <img src="${c.photo}">
                <div class="card-meta">
                    <h3 style="margin:0">${c.name}</h3>
                    <p style="margin:0; font-size:0.7rem; color:#ccc;">${c.cat} • ${c.country}</p>
                </div>
            </div>`).join('');
    }

    function setCat(c, btn) {
        category = c;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGrid();
    }

    function openChat(id) {
        current = characters.find(c => c.id === id);
        document.getElementById('chat-name-top').innerText = current.name;
        document.getElementById('side-photo').src = current.photo;
        document.getElementById('side-name').innerText = current.name;
        document.getElementById('chat-view').style.display = 'block';
        showTab('profile');
        loadChat();
    }

    function showTab(type) {
        document.getElementById('tab-prof').classList.toggle('active', type === 'profile');
        document.getElementById('tab-gal').classList.toggle('active', type === 'gallery');
        const content = document.getElementById('side-content');
        
        if(type === 'profile') {
            content.innerHTML = `
                <div class="mood-badge" style="margin: 15px auto;">${current.mood}</div>
                <p style="text-align:center; color:#aaa; font-size:0.8rem; line-height:1.5;">${current.bio}</p>
                <div class="tag-group">${current.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
            `;
        } else {
            content.innerHTML = `
                <div class="gallery-grid" style="margin-top:15px;">
                    ${current.gallery.map(img => `
                        <div class="gallery-item">
                            <img src="${img.url}" class="${img.locked ? 'locked' : ''}">
                            ${img.locked ? '<div class="lock-icon">🔒</div>' : ''}
                        </div>
                    `).join('')}
                </div>
                <p style="color:var(--accent); font-size:0.65rem; text-align:center; margin-top:10px;">Unlock full gallery with Premium</p>
            `;
        }
    }

    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }

    function loadChat() {
        const history = JSON.parse(localStorage.getItem('ch_' + current.id) || "[]");
        const box = document.getElementById('messages');
        box.innerHTML = history.length ? history.map(m => `<div class="msg ${m.role === 'user' ? 'user' : 'ai'}">${m.content}</div>`).join('') : `<div class="msg ai">${current.greeting}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        if(energy <= 0) {
            alert("Out of Energy! Wait for refill or Upgrade.");
            return;
        }

        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if(!val) return;

        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg user">${val}</div>`;
        input.value = '';
        saveLocal('user', val);

        const tid = "t-" + Date.now();
        box.innerHTML += `<div class="msg ai" id="${tid}">...</div>`;
        box.scrollTop = box.scrollHeight;

        try {
            const hist = JSON.parse(localStorage.getItem('ch_' + current.id) || "[]");
            const res = await fetch("/api/chat.mjs", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ character: current.name, bio: current.bio, message: val, history: hist })
            });
            const data = await res.json();
            document.getElementById(tid).remove();
            box.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            saveLocal('assistant', data.reply);
            
            energy--;
            updateEnergy();
        } catch (e) { document.getElementById(tid).innerText = "Error!"; }
        box.scrollTop = box.scrollHeight;
    }

    function saveLocal(role, content) {
        const key = 'ch_' + current.id;
        const hist = JSON.parse(localStorage.getItem(key) || "[]");
        hist.push({ role, content });
        localStorage.setItem(key, JSON.stringify(hist));
    }

    function resetChat() { localStorage.removeItem('ch_' + current.id); loadChat(); }

    updateEnergy();
    renderGrid();
</script>
</body>
</html>
