<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Private Dashboard</title>
    <style>
        :root { --bg: #05040a; --card: #0f0d1f; --text: #ffffff; --accent: #f80759; --border: #1f1b3d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        
        /* Header & Energy */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5, 4, 10, 0.9); backdrop-filter: blur(15px); position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.2rem; cursor: pointer; }
        .energy-pill { background: rgba(248, 7, 89, 0.1); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: var(--accent); font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .refill-btn { background: var(--accent); border: none; color: white; width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-weight: bold; }

        /* Discovery Grid */
        .main-content { height: calc(100vh - 70px); overflow-y: auto; padding: 25px; }
        .top-tools { max-width: 1200px; margin: 0 auto 25px; display: flex; flex-direction: column; gap: 15px; }
        #search { background: var(--card); border: 1px solid var(--border); color: white; padding: 12px 20px; border-radius: 12px; width: 100%; max-width: 400px; outline: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .card-name { padding: 10px; background: linear-gradient(transparent, #000); position: absolute; bottom: 0; width: 100%; font-weight: bold; box-sizing: border-box; }

        /* SPLIT SCREEN CHAT */
        #chat-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; }
        .chat-layout { display: flex; height: 100%; width: 100%; max-width: 1200px; margin: 0 auto; }

        /* Side 1: Large Profile Picture */
        .chat-sidebar { width: 400px; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 30px; align-items: center; overflow-y: auto; background: var(--card); }
        .big-photo { width: 260px; height: 260px; border-radius: 30px; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 25px; box-shadow: 0 0 30px rgba(248, 7, 89, 0.2); }
        .mood-tag { background: linear-gradient(90deg, #ff00cc, #3333ff); padding: 8px 20px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; margin-bottom: 20px; width: 100%; text-align: center; }
        
        /* Side 2: Phone-Style Narrow Chat */
        .chat-main { flex: 1; max-width: 480px; display: flex; flex-direction: column; background: #080712; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* Bubbles & Animation */
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 0.95rem; line-height: 1.5; }
        .ai { background: var(--card); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }

        .typing { display: flex; gap: 5px; padding: 10px; }
        .dot { width: 6px; height: 6px; background: #f80759; border-radius: 50%; animation: blink 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; transform: translateY(-3px); } }

        /* Input area */
        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        #userInput { flex: 1; background: #16142e; border: 1px solid var(--border); border-radius: 25px; padding: 12px 20px; color: white; outline: none; }

        /* Tabs */
        .tabs { display: flex; width: 100%; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-size: 0.75rem; font-weight: bold; color: #555; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Gallery */
        .gal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .gal-img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; filter: blur(15px); opacity: 0.5; }

        /* Shop Modal */
        #shop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        .shop-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align: center; width: 300px; }
        .buy-btn { background: var(--bg); color: white; border: 1px solid var(--border); padding: 12px; width: 100%; margin: 5px 0; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .buy-btn:hover { border-color: var(--accent); }

        @media (max-width: 900px) { .chat-sidebar { display: none; } }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">CHATHUB.AI</div>
    <div class="energy-pill">
        <span id="energy-txt">⚡ 10 ENERGY</span>
        <button class="refill-btn" onclick="openShop()">+</button>
    </div>
</header>

<div class="main-content">
    <div class="top-tools">
        <input type="text" id="search" placeholder="Search girls..." oninput="renderGrid()">
    </div>
    <div class="grid" id="char-grid"></div>
</div>

<div id="chat-view">
    <div class="chat-layout">
        <div class="chat-sidebar">
            <img id="side-photo" class="big-photo">
            <h2 id="side-name" style="margin:0"></h2>
            <div id="side-mood" class="mood-tag"></div>
            <div class="tabs">
                <div id="t-prof" class="tab active" onclick="setTab('p')">PROFILE</div>
                <div id="t-gal" class="tab" onclick="setTab('g')">PHOTOS</div>
            </div>
            <div id="side-data" style="font-size: 0.85rem; color: #aaa; text-align: center;"></div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">✕</button>
                <div id="header-name" style="font-weight:bold;"></div>
                <div style="width:24px;"></div>
            </div>
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
                <button onclick="send()" style="background:var(--accent); border:none; color:white; width:40px; height:40px; border-radius:50%; cursor:pointer;">➔</button>
            </div>
        </div>
    </div>
</div>

<div id="shop">
    <div class="shop-box">
        <h2 style="color:var(--accent)">Refill Energy</h2>
        <button class="buy-btn" onclick="buy(50)">⚡ 50 Energy - $4.99</button>
        <button class="buy-btn" onclick="buy(200)">⚡ 200 Energy - $14.99</button>
        <button onclick="closeShop()" style="background:none; border:none; color:#555; margin-top:10px; cursor:pointer;">Close</button>
    </div>
</div>

<script>
    const characters = [
        { id: 1, name: "Sakura 🌸", mood: "FRISKY 🔥", cat: "Spicy", bio: "Artist with a secret wild side. I love it when you take control.", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600", greeting: "I was just getting lonely... come closer?" },
        { id: 2, name: "Luna 🎮", mood: "DOMINANT 😈", cat: "Gaming", bio: "High stakes gamer. If you play your cards right, I'll reward you.", photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=600", greeting: "Gg. Ready for the real game to start?" }
    ];

    let current = null;
    let energy = localStorage.getItem('energy') || 10;

    function renderGrid() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = characters.filter(c => c.name.toLowerCase().includes(q));
        document.getElementById('char-grid').innerHTML = filtered.map(c => `
            <div class="card" onclick="openChat(${c.id})">
                <img src="${c.photo}">
                <div class="card-name">${c.name}</div>
            </div>`).join('');
    }

    function openChat(id) {
        current = characters.find(c => c.id === id);
        document.getElementById('side-photo').src = current.photo;
        document.getElementById('side-name').innerText = current.name;
        document.getElementById('header-name').innerText = current.name;
        document.getElementById('side-mood').innerText = current.mood;
        document.getElementById('chat-view').style.display = 'block';
        setTab('p');
        loadMessages();
    }

    function setTab(t) {
        document.getElementById('t-prof').className = t==='p'?'tab active':'tab';
        document.getElementById('t-gal').className = t==='g'?'tab active':'tab';
        document.getElementById('side-data').innerHTML = t==='p' ? current.bio : `<div class="gal-grid"><img class="gal-img" src="${current.photo}"><img class="gal-img" src="${current.photo}"></div><p style="color:var(--accent); font-weight:bold; margin-top:10px;">🔒 Locked: Chat more to see</p>`;
    }

    function loadMessages() {
        const h = JSON.parse(localStorage.getItem('h_'+current.id) || "[]");
        const box = document.getElementById('messages');
        box.innerHTML = h.length ? h.map(m => `<div class="msg ${m.role==='user'?'user':'ai'}">${m.content}</div>`).join('') : `<div class="msg ai">${current.greeting}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text || energy <= 0) { if(energy<=0) openShop(); return; }

        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        saveLocal('user', text);

        const tid = "dots-" + Date.now();
        box.innerHTML += `<div class="msg ai" id="${tid}"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
        box.scrollTop = box.scrollHeight;

        try {
            const h = JSON.parse(localStorage.getItem('h_'+current.id) || "[]");
            const res = await fetch("/api/chat.mjs", {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ character: current.name, bio: current.bio, message: text, history: h })
            });
            const data = await res.json();
            document.getElementById(tid).remove();
            
            const aiMsg = document.createElement('div');
            aiMsg.className = 'msg ai';
            box.appendChild(aiMsg);
            
            let i = 0;
            function type() {
                if (i < data.reply.length) {
                    aiMsg.innerHTML += data.reply.charAt(i);
                    i++; box.scrollTop = box.scrollHeight;
                    setTimeout(type, 20);
                } else { saveLocal('assistant', data.reply); }
            }
            type();
            energy--;
            updateEnergy();
        } catch (e) { document.getElementById(tid).innerText = "Connection lost..."; }
    }

    function updateEnergy() {
        document.getElementById('energy-txt').innerText = `⚡ ${energy} ENERGY`;
        localStorage.setItem('energy', energy);
    }

    function saveLocal(role, content) {
        const h = JSON.parse(localStorage.getItem('h_'+current.id) || "[]");
        h.push({role, content});
        localStorage.setItem('h_'+current.id, JSON.stringify(h));
    }

    function openShop() { document.getElementById('shop').style.display = 'flex'; }
    function closeShop() { document.getElementById('shop').style.display = 'none'; }
    function buy(n) { energy = parseInt(energy) + n; updateEnergy(); closeShop(); }
    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }

    // Keyboard Enter listener
    document.getElementById('userInput').addEventListener('keydown', (e) => { if(e.key==='Enter') send(); });

    renderGrid();
    updateEnergy();
</script>
</body>
</html>
