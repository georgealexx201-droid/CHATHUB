<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Discovery</title>
    <style>
        :root { --bg: #0b091a; --card-bg: #161233; --text: #ffffff; --accent: #f80759; --border: #2a2456; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        /* Header & Search */
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); background: rgba(11,9,26,0.9); backdrop-filter: blur(10px); position: sticky; top:0; z-index:100; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.4rem; }
        
        .search-container { position: relative; width: 100%; }
        .search-bar { width: 100%; background: var(--card-bg); border: 1px solid var(--border); padding: 12px 40px; border-radius: 12px; color: white; box-sizing: border-box; outline: none; }

        /* Filter Tabs */
        .filter-bar { display: flex; gap: 10px; padding: 10px 20px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
        .filter-btn { background: var(--glass); border: 1px solid var(--border); color: #ccc; padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; transition: 0.3s; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Grid */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .profile-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; transition: 0.3s; }
        .profile-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .img-container { width: 100%; padding-top: 135%; position: relative; }
        .img-container img { position: absolute; top:0; width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 12px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }

        /* Modal & Chat (Same as before but polished) */
        #profile-modal, #chat-screen { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 2000; }
        #profile-modal { background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card-bg); border-radius: 20px; width: 100%; max-width: 400px; overflow: hidden; border: 1px solid var(--border); }
        .btn-chat { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        #chat-screen { flex-direction: column; z-index: 3000; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; }
        .ai { background: var(--card-bg); align-self: flex-start; border: 1px solid var(--border); }
        .user { background: var(--accent); align-self: flex-end; }
        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); background: var(--bg); }
        .input-area input { flex: 1; background: var(--card-bg); border: 1px solid var(--border); border-radius: 25px; padding: 12px 20px; color: white; outline: none; }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <div class="logo" onclick="location.reload()">CHATHUB.AI</div>
        <div style="color: #00ff88; font-size: 0.7rem;">● LIVE</div>
    </div>
    <div class="search-container">
        <input type="text" class="search-bar" id="searchInput" placeholder="Search characters..." oninput="filterAll()">
    </div>
</header>

<div class="filter-bar">
    <button class="filter-btn active" onclick="setCategory('All', this)">All</button>
    <button class="filter-btn" onclick="setCategory('Creative', this)">Creative</button>
    <button class="filter-btn" onclick="setCategory('Gaming', this)">Gaming</button>
    <button class="filter-btn" onclick="setCategory('Professional', this)">Professional</button>
</div>

<div class="grid-container" id="grid"></div>

<div id="profile-modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <img id="m-img" style="width:100%; height:320px; object-fit:cover;">
        <div style="padding: 20px;">
            <h2 id="m-name" style="margin:0"></h2>
            <p id="m-bio" style="color:#bbb; font-size: 0.9rem; margin: 10px 0;"></p>
            <button class="btn-chat" onclick="goToChat()">Start Chat</button>
        </div>
    </div>
</div>

<div id="chat-screen">
    <header style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button>
        <div id="chat-title" style="font-weight:bold"></div>
        <button onclick="clearChat()" style="background:none; border:none; color:var(--accent); font-size:0.7rem;">RESET</button>
    </header>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message...">
        <button onclick="send()" style="background:var(--accent); border:none; border-radius:50%; width:45px; height:45px; color:white; cursor:pointer;">➔</button>
    </div>
</div>

<script>
    const characters = [
        { id: 1, name: "Sakura 🌸", category: "Creative", bio: "Artist. Soft-spoken, loves pastels and anime.", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500", greeting: "Hey! Just mixing some new paints. What's on your mind?" },
        { id: 2, name: "Luna 🎮", category: "Gaming", bio: "Pro Gamer. Sarcastic, high energy, loves RPGs.", photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=500", greeting: "GG. Hope you're not a casual. What's the plan?" },
        { id: 3, name: "Elena 📚", category: "Creative", bio: "Philosophy student. Deep thinker, loves old books.", photo: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500", greeting: "I was just reading Rilke. Do you believe in destiny?" },
        { id: 4, name: "Jax 🏋️", category: "Professional", bio: "Elite Coach. No excuses. High discipline.", photo: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=500", greeting: "CHAMP! WHY ARE WE TALKING WHEN WE COULD BE LIFTING?" }
    ];

    let current = null;
    let selectedCategory = 'All';

    function render(list) {
        document.getElementById('grid').innerHTML = list.map(c => `
            <div class="profile-card" onclick="openModal(${c.id})">
                <div class="img-container"><img src="${c.photo}"></div>
                <div class="card-info">
                    <h3 style="margin:0; font-size:1rem;">${c.name}</h3>
                    <p style="margin:0; font-size:0.7rem; color:#aaa;">${c.category}</p>
                </div>
            </div>`).join('');
    }

    function setCategory(cat, btn) {
        selectedCategory = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterAll();
    }

    function filterAll() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = characters.filter(c => {
            const matchesCat = selectedCategory === 'All' || c.category === selectedCategory;
            const matchesSearch = c.name.toLowerCase().includes(query);
            return matchesCat && matchesSearch;
        });
        render(filtered);
    }

    function openModal(id) {
        current = characters.find(c => c.id === id);
        document.getElementById('m-name').innerText = current.name;
        document.getElementById('m-bio').innerText = current.bio;
        document.getElementById('m-img').src = current.photo;
        document.getElementById('profile-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('profile-modal').style.display = 'none'; }

    function goToChat() {
        closeModal();
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = current.name;
        loadChat();
    }

    function closeChat() { document.getElementById('chat-screen').style.display = 'none'; }

    function loadChat() {
        const key = 'ch_' + current.id;
        const history = JSON.parse(localStorage.getItem(key) || "[]");
        const msgDiv = document.getElementById('messages');
        if (history.length > 0) {
            msgDiv.innerHTML = history.map(m => `<div class="msg ${m.role === 'user' ? 'user' : 'ai'}">${m.content}</div>`).join('');
        } else {
            msgDiv.innerHTML = `<div class="msg ai">${current.greeting}</div>`;
        }
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;
        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        save('user', text);
        const tid = "t-" + Date.now();
        msgDiv.innerHTML += `<div class="msg ai" id="${tid}">...</div>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;
        try {
            const history = JSON.parse(localStorage.getItem('ch_' + current.id) || "[]");
            const res = await fetch("/api/chat.mjs", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ character: current.name, bio: current.bio, message: text, history: history })
            });
            const data = await res.json();
            document.getElementById(tid).remove();
            msgDiv.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            save('assistant', data.reply);
        } catch (e) { document.getElementById(tid).innerText = "Error!"; }
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    function save(role, content) {
        const key = 'ch_' + current.id;
        const history = JSON.parse(localStorage.getItem(key) || "[]");
        history.push({ role, content });
        localStorage.setItem(key, JSON.stringify(history));
    }

    function clearChat() {
        localStorage.removeItem('ch_' + current.id);
        loadChat();
    }

    render(characters);
</script>
</body>
</html>
