<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub AI | Premium Experience</title>
    <style>
        :root { --ig-bg: #ffffff; --ig-text: #262626; --ig-link: #0095f6; --ig-border: #dbdbdb; --ai-bubble: #f1f1f1; --user-bubble: #0095f6; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #fafafa; margin: 0; }
        header { background: #fff; border-bottom: 1px solid var(--ig-border); padding: 15px; text-align: center; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
        .screen { display: none; max-width: 935px; margin: 0 auto; width: 100%; }
        .active-screen { display: flex; flex-direction: column; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .profile-card { background: white; border: 1px solid var(--ig-border); border-radius: 8px; overflow: hidden; cursor: pointer; }
        .img-container { width: 100%; padding-top: 125%; position: relative; background: #eee; }
        .img-container img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        #chat-container { width: 100%; max-width: 500px; height: 85vh; background: white; border: 1px solid var(--ig-border); margin: 10px auto; display: flex; flex-direction: column; border-radius: 12px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 16px; border-radius: 18px; max-width: 80%; font-size: 0.95rem; }
        .ai { align-self: flex-start; background: var(--ai-bubble); }
        .user { align-self: flex-end; background: var(--user-bubble); color: white; }
        #input-area { padding: 15px; border-top: 1px solid var(--ig-border); display: flex; gap: 10px; }
        input { flex: 1; border: none; outline: none; font-size: 1rem; }
        button { background: none; border: none; color: var(--ig-link); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <button onclick="location.reload()" id="backBtn" style="display:none; cursor:pointer; border:none; background:none; color:var(--ig-link); font-weight:bold;">← Back</button>
    <h1 style="margin:0; font-style:italic;">ChatHub AI</h1>
    <div style="width:40px"></div>
</header>

<div id="grid-screen" class="screen active-screen">
    <div class="grid-container" id="gridContainer"></div>
</div>

<div id="chat-screen" class="screen">
    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const characters = [
        { id: 1, name: "Sakura 🌸", bio: "22yo Tokyo artist. Friendly and creative.", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&q=80&w=500" },
        { id: 2, name: "Luna 🎮", bio: "Gamer girl. Sarcastic but chill.", photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?auto=format&fit=crop&q=80&w=500" },
        { id: 3, name: "Elena 📚", bio: "Quiet writer. Loves deep philosophy.", photo: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&q=80&w=500" }
    ];

    let currentAi = null;
    let chatHistory = []; // IMPORTANT: This stays OUTSIDE the function to keep memory!

    function init() {
        document.getElementById('gridContainer').innerHTML = characters.map(c => `
            <div class="profile-card" onclick="startChat(${c.id})">
                <div class="img-container"><img src="${c.photo}"></div>
                <div style="padding:10px; text-align:center;"><b>${c.name}</b></div>
            </div>`).join('');
    }

    function startChat(id) {
        currentAi = characters.find(c => c.id === id);
        chatHistory = []; // Reset memory for a fresh start with a new character
        document.getElementById('grid-screen').classList.remove('active-screen');
        document.getElementById('chat-screen').classList.add('active-screen');
        document.getElementById('backBtn').style.display = "block";
        document.getElementById('messages').innerHTML = `<div class="msg ai">Hi! I'm ${currentAi.name}. Tell me something about yourself!</div>`;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        msgDiv.scrollTop = msgDiv.scrollHeight;

        try {
            // Note the new .mjs extension here:
            const response = await fetch("/.api/chat.mjs", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    character: currentAi.name, 
                    bio: currentAi.bio, 
                    message: text,
                    history: chatHistory 
                })
            });
            
            const data = await response.json();
            
            if(data.reply) {
                msgDiv.innerHTML += `<div class="msg ai">${data.reply}</div>`;
                // UPDATE MEMORY
                chatHistory.push({ role: "user", content: text });
                chatHistory.push({ role: "assistant", content: data.reply });
            }
        } catch (e) {
            msgDiv.innerHTML += `<div class="msg ai">System lag. Try again!</div>`;
        }
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    init();
</script>
</body>
</html>
