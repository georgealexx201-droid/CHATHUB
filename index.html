<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Final Empire Edition</title>
    <style>
        :root { --bg: #05040a; --card: #0f0d1f; --text: #ffffff; --accent: #f80759; --border: #1f1b3d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5, 4, 10, 0.9); backdrop-filter: blur(15px); position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.2rem; cursor: pointer; }
        .search-input { background: #16142e; border: 1px solid var(--border); color: white; padding: 8px 15px; border-radius: 20px; outline: none; width: 180px; font-size: 0.8rem; }
        .energy-pill { background: rgba(248, 7, 89, 0.1); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: var(--accent); font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 25px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; height: 320px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        #chat-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; }
        .chat-layout { display: flex; height: 100%; width: 100%; }
        .sidebar { width: 300px; border-right: 1px solid var(--border); padding: 20px; background: var(--card); display: flex; flex-direction: column; align-items: center; }
        .big-photo { width: 200px; height: 200px; border-radius: 20px; object-fit: cover; border: 2px solid var(--accent); }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #080712; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 0.9rem; }
        .ai { background: var(--card); align-self: flex-start; }
        .user { background: var(--accent); align-self: flex-end; }
        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        #admin-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; }
        .modal-card { background: var(--card); padding: 25px; border-radius: 15px; width: 320px; }
        input, textarea { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 10px; margin: 5px 0; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="logo">CHATHUB.AI</div>
    <div style="display:flex; gap:10px;">
        <input type="text" id="searchInput" class="search-input" placeholder="Find a girl..." onkeyup="filterChars()">
        <button onclick="openAdmin()" style="background:var(--accent); border:none; color:white; padding:8px 15px; border-radius:20px; cursor:pointer;">+ NEW</button>
        <div class="energy-pill" id="energy-txt">⚡ 10 ENERGY</div>
    </div>
</header>

<div class="grid" id="char-grid"></div>

<div id="admin-modal">
    <div class="modal-card">
        <h3>New Character</h3>
        <input type="text" id="admName" placeholder="Name">
        <input type="text" id="admMood" placeholder="Vibe (e.g. Naughty)">
        <input type="text" id="admImg" placeholder="Image URL">
        <textarea id="admBio" placeholder="Bio..."></textarea>
        <button onclick="saveCharacter()" style="width:100%; background:var(--accent); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">SAVE</button>
        <button onclick="closeAdmin()" style="width:100%; background:none; border:none; color:#555; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="chat-view">
    <div class="chat-layout">
        <div class="sidebar">
            <img id="side-photo" class="big-photo">
            <h2 id="side-name"></h2>
            <p id="side-content" style="color:#888; text-align:center; font-size:0.8rem;"></p>
            <button onclick="closeChat()" style="background:var(--accent); border:none; color:white; padding:10px 20px; border-radius:10px; cursor:pointer; margin-top:auto;">Leave Chat</button>
        </div>
        <div class="chat-main">
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your message..." onkeydown="if(event.key==='Enter') send()">
                <button onclick="send()" style="background:var(--accent); border:none; color:white; padding:10px 20px; border-radius:10px; cursor:pointer;">➔</button>
            </div>
        </div>
    </div>
</div>

<script>
    let characters = JSON.parse(localStorage.getItem('candy_empire_db')) || [
        { id: 1, name: "Sakura 🌸", mood: "FRISKY 🔥", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400", bio: "Artistic and curious." },
        { id: 2, name: "Elena 🍷", mood: "DOMINANT 👑", photo: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=400", bio: "She runs the city." }
    ];

    let current = null;
    let energy = 10;

    function renderGrid() {
        document.getElementById('char-grid').innerHTML = characters.map(c => `
            <div class="card" data-name="${c.name}" onclick="openChat(${c.id})">
                <img src="${c.photo}">
                <div style="position:absolute; bottom:0; padding:10px; background:linear-gradient(transparent, #000); width:100%;">
                    <b>${c.name}</b><br><small style="color:var(--accent)">${c.mood}</small>
                </div>
            </div>`).join('');
    }

    function filterChars() {
        let term = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            card.style.display = card.getAttribute('data-name').toLowerCase().includes(term) ? "block" : "none";
        });
    }

    function openChat(id) {
        current = characters.find(c => c.id === id);
        document.getElementById('side-photo').src = current.photo;
        document.getElementById('side-name').innerText = current.name;
        document.getElementById('side-content').innerText = current.bio;
        document.getElementById('chat-view').style.display = 'block';
        document.getElementById('messages').innerHTML = `<div class="msg ai">I've been waiting for you...</div>`;
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ character: current.name, message: text, vibe: current.mood, bio: current.bio })
            });
            const data = await res.json();
            box.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            box.scrollTop = box.scrollHeight;
        } catch (e) {
            box.innerHTML += `<div class="msg ai">Connection lost... stay with me.</div>`;
        }
    }

    function openAdmin() { document.getElementById('admin-modal').style.display='flex'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display='none'; }
    function saveCharacter() {
        const char = {
            id: Date.now(),
            name: document.getElementById('admName').value,
            mood: document.getElementById('admMood').value,
            photo: document.getElementById('admImg').value,
            bio: document.getElementById('admBio').value
        };
        characters.push(char);
        localStorage.setItem('candy_empire_db', JSON.stringify(characters));
        renderGrid(); closeAdmin();
    }
    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }

    renderGrid();
</script>
</body>
</html>
