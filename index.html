<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub AI | Premium AI Characters</title>
    <style>
        :root {
            --ig-bg: #ffffff;
            --ig-text: #262626;
            --ig-secondary: #8e8e8e;
            --ig-link: #0095f6;
            --ig-border: #dbdbdb;
            --ai-bubble: #0095f6;
            --user-bubble: #efefef;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: var(--ig-text);
            margin: 0; padding: 0; height: 100vh;
        }

        header {
            background-color: var(--ig-bg);
            border-bottom: 1px solid var(--ig-border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; font-style: italic; letter-spacing: -1px; }
        .back-btn { display: none; background: none; border: none; color: var(--ig-link); font-weight: 600; cursor: pointer; font-size: 1rem; }

        .screen { display: none; flex-direction: column; max-width: 935px; margin: 0 auto; width: 100%; }
        .active-screen { display: flex; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
        }

        .profile-card {
            background: white;
            border: 1px solid var(--ig-border);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            text-align: center;
        }

        .img-container { width: 100%; padding-top: 100%; position: relative; background: #eee; }
        .img-container img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        
        .profile-info { padding: 10px; }
        .profile-info h3 { margin: 0; font-size: 0.9rem; font-weight: 600; }
        .profile-info p { margin: 2px 0 0; font-size: 0.75rem; color: var(--ig-secondary); }

        #chat-interface { height: calc(100vh - 60px); display: flex; justify-content: center; align-items: flex-start; padding-top: 20px; }
        #chat-container {
            width: 100%; max-width: 500px; height: 80vh;
            background: white; border: 1px solid var(--ig-border);
            border-radius: 12px; display: flex; flex-direction: column; overflow: hidden;
        }

        #chat-header {
            padding: 15px; border-bottom: 1px solid var(--ig-border);
            display: flex; align-items: center; gap: 12px;
        }
        #chat-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 16px; border-radius: 22px; max-width: 75%; font-size: 0.95rem; line-height: 1.4; }
        .ai { align-self: flex-start; background-color: white; border: 1px solid var(--ig-border); }
        .user { align-self: flex-end; background-color: var(--ai-bubble); color: white; }

        #input-area { padding: 15px; border-top: 1px solid var(--ig-border); display: flex; }
        #userInput { flex: 1; border: none; outline: none; padding: 10px; }
        #sendBtn { background: none; border: none; color: var(--ig-link); font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <button class="back-btn" id="backBtn" onclick="showGrid()">← Back</button>
    <h1>ChatHub AI</h1>
    <div style="width: 40px;"></div>
</header>

<div id="grid-screen" class="screen active-screen">
    <div class="grid-container" id="gridContainer"></div>
</div>

<div id="chat-screen" class="screen">
    <div id="chat-interface">
        <div id="chat-container">
            <div id="chat-header">
                <img src="" id="chatPic">
                <span id="chatName" style="font-weight:600;"></span>
            </div>
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="userInput" placeholder="Message...">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    // YOUR KEY INTEGRATED
    const API_KEY = "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";
    
    const characters = [
        { id: 1, name: "Sakura 🌸", role: "Artist", bio: "Bubbly and creative artist.", photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=Sakura" },
        { id: 2, name: "Luna 🎮", role: "Gamer", bio: "Cool competitive gamer girl.", photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=Luna" },
        { id: 3, name: "Elena 📚", role: "Poet", bio: "Deep and mysterious writer.", photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=Elena" }
    ];

    let currentAi = null;

    function initGrid() {
        const container = document.getElementById('gridContainer');
        container.innerHTML = characters.map(char => `
            <div class="profile-card" onclick="openChat(${char.id})">
                <div class="img-container"><img src="${char.photo}"></div>
                <div class="profile-info"><h3>${char.name}</h3><p>${char.role}</p></div>
            </div>`).join('');
    }

    function openChat(id) {
        currentAi = characters.find(c => c.id === id);
        document.getElementById('chatPic').src = currentAi.photo;
        document.getElementById('chatName').textContent = currentAi.name;
        document.getElementById('messages').innerHTML = `<div class="msg ai">Hey! I'm ${currentAi.name}. Let's chat!</div>`;
        document.getElementById('grid-screen').classList.remove('active-screen');
        document.getElementById('chat-screen').classList.add('active-screen');
        document.getElementById('backBtn').style.display = 'block';
    }

    function showGrid() {
        document.getElementById('grid-screen').classList.add('active-screen');
        document.getElementById('chat-screen').classList.remove('active-screen');
        document.getElementById('backBtn').style.display = 'none';
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        msgDiv.scrollTop = msgDiv.scrollHeight;

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + API_KEY, // Direct connection
                    "Content-Type": "application/json",
                    "HTTP-Referer": window.location.href, // Required by OpenRouter
                    "X-Title": "ChatHub AI"
                },
                body: JSON.stringify({
                    "model": "google/gemini-2.0-flash-001",
                    "messages": [
                        { "role": "system", "content": "You are " + currentAi.name + ". " + currentAi.bio },
                        { "role": "user", "content": text }
                    ]
                })
            });

            const data = await response.json();
            if (data.error) {
                msgDiv.innerHTML += `<div class="msg ai">Error: ${data.error.message}</div>`;
            } else {
                msgDiv.innerHTML += `<div class="msg ai">${data.choices[0].message.content}</div>`;
            }
        } catch (err) {
            msgDiv.innerHTML += `<div class="msg ai">Connection error. Check your balance!</div>`;
        }
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    initGrid();
</script>
</body>
</html>
