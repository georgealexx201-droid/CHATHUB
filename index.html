<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Premium</title>
    <style>
        :root { --bg: #05040a; --card: #0f0d1f; --text: #ffffff; --accent: #f80759; --border: #1f1b3d; --glass: rgba(255, 255, 255, 0.03); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        
        /* Header */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5, 4, 10, 0.8); backdrop-filter: blur(15px); position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.2rem; cursor: pointer; }
        #energy-display { background: rgba(248, 7, 89, 0.1); border: 1px solid var(--accent); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; color: var(--accent); font-weight: bold; }

        /* Discovery Grid */
        .main-content { height: calc(100vh - 70px); overflow-y: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { border-color: var(--accent); transform: scale(1.02); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-info { padding: 10px; background: linear-gradient(transparent, #000); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }

        /* SPLIT VIEW CHAT (Centered & Narrow) */
        #chat-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; }
        .chat-container { display: flex; width: 100%; height: 100%; max-width: 1100px; margin: 0 auto; background: #080712; }

        /* Left Sidebar: Profile (Bigger Picture) */
        .chat-sidebar { width: 380px; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px; align-items: center; overflow-y: auto; }
        .big-profile-img { width: 220px; height: 220px; border-radius: 25px; object-fit: cover; border: 2px solid var(--accent); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(248, 7, 89, 0.2); }
        
        /* Middle: Chat (Phone Style - Narrow) */
        .chat-main { flex: 1; max-width: 500px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: #0b0a1a; margin: 0 auto; }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        /* Message Bubbles */
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .ai { background: var(--card); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Typing Animation */
        .typing { display: flex; gap: 4px; padding: 10px; }
        .dot { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

        /* Input Area */
        .input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input#userInput { flex: 1; background: #16142e; border: 1px solid var(--border); border-radius: 25px; padding: 12px 20px; color: white; outline: none; }
        input#userInput:focus { border-color: var(--accent); }

        /* Utils */
        .tab-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 0.7rem; color: #666; font-weight: bold; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        @media (max-width: 800px) { .chat-sidebar { display: none; } .chat-main { max-width: 100%; } }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">CHATHUB.AI</div>
    <div id="energy-display">⚡ 10 ENERGY</div>
</header>

<div class="main-content">
    <div style="margin-bottom:20px; display:flex; gap:10px;">
        <input type="text" id="search" placeholder="Search girls..." oninput="renderGrid()" style="background:var(--card); border:1px solid var(--border); color:white; padding:10px 20px; border-radius:20px; flex:1;">
    </div>
    <div class="grid" id="char-grid"></div>
</div>

<div id="chat-view">
    <div class="chat-container">
        <div class="chat-sidebar">
            <img id="side-photo" class="big-profile-img">
            <h2 id="side-name" style="margin:0"></h2>
            <div style="background:linear-gradient(90deg, #ff00cc, #3333ff); padding:5px 15px; border-radius:10px; font-size:0.7rem; font-weight:bold; margin:15px 0;" id="side-mood"></div>
            <div style="display:flex; width:100%; margin-bottom:15px;">
                <div class="tab-btn active" id="tab-p" onclick="setTab('p')">PROFILE</div>
                <div class="tab-btn" id="tab-g" onclick="setTab('g')">GALLERY</div>
            </div>
            <div id="side-content" style="font-size:0.85rem; color:#aaa; text-align:center; line-height:1.6;"></div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">✕</button>
                <div id="top-name" style="font-weight:bold; font-size:0.9rem;"></div>
                <div style="width:20px;"></div>
            </div>
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Message..." autocomplete="off">
                <button onclick="send()" style="background:var(--accent); border:none; color:white; width:40px; height:40px; border-radius:50%; cursor:pointer;">➔</button>
            </div>
        </div>
    </div>
</div>

<script>
    const characters = [
        { id: 1, name: "Sakura 🌸", mood: "FRISKY 🔥", bio: "Your personal artist. Let's make something beautiful... or bad.", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600", greeting: "I've been waiting for you... what took so long?" },
        { id: 2, name: "Luna 🎮", mood: "PLAYFUL 😈", bio: "I don't lose. Not in games, and definitely not in bed.", photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=600", greeting: "Ready for round two? I promise I won't go easy on you." }
    ];

    let current = null;
    let energy = localStorage.getItem('energy') || 10;

    function renderGrid() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = characters.filter(c => c.name.toLowerCase().includes(query));
        document.getElementById('char-grid').innerHTML = filtered.map(c => `
            <div class="card" onclick="openChat(${c.id})">
                <img src="${c.photo}">
                <div class="card-info"><b>${c.name}</b></div>
            </div>`).join('');
    }

    function openChat(id) {
        current = characters.find(c => c.id === id);
        document.getElementById('side-photo').src = current.photo;
        document.getElementById('side-name').innerText = current.name;
        document.getElementById('top-name').innerText = current.name;
        document.getElementById('side-mood').innerText = current.mood;
        document.getElementById('chat-view').style.display = 'block';
        setTab('p');
        loadMessages();
    }

    function setTab(t) {
        document.getElementById('tab-p').className = t==='p'?'tab-btn active':'tab-btn';
        document.getElementById('tab-g').className = t==='g'?'tab-btn active':'tab-btn';
        document.getElementById('side-content').innerHTML = t==='p' ? current.bio : "Gallery locked. Chat more to unlock private photos.";
    }

    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }

    function loadMessages() {
        const hist = JSON.parse(localStorage.getItem('h_'+current.id) || "[]");
        const box = document.getElementById('messages');
        box.innerHTML = hist.length ? hist.map(m => `<div class="msg ${m.role==='user'?'user':'ai'}">${m.content}</div>`).join('') : `<div class="msg ai">${current.greeting}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if(!val || energy <= 0) return;

        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg user">${val}</div>`;
        input.value = '';
        save('user', val);

        // Typing indicator
        const tid = "type-" + Date.now();
        box.innerHTML += `<div class="msg ai" id="${tid}"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
        box.scrollTop = box.scrollHeight;

        try {
            const h = JSON.parse(localStorage.getItem('h_'+current.id) || "[]");
            const res = await fetch("/api/chat.mjs", {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ character: current.name, bio: current.bio, message: val, history: h })
            });
            const data = await res.json();
            document.getElementById(tid).remove();
            
            // Typewriter effect simulation
            const aiMsg = document.createElement('div');
            aiMsg.className = 'msg ai';
            box.appendChild(aiMsg);
            
            let i = 0;
            const text = data.reply;
            function type() {
                if (i < text.length) {
                    aiMsg.innerHTML += text.charAt(i);
                    i++;
                    box.scrollTop = box.scrollHeight;
                    setTimeout(type, 20);
                }
            }
            type();
            save('assistant', text);
            energy--;
            document.getElementById('energy-display').innerText = `⚡ ${energy} ENERGY`;
            localStorage.setItem('energy', energy);
        } catch (e) { document.getElementById(tid).innerText = "Connection lost..."; }
    }

    function save(role, content) {
        const h = JSON.parse(localStorage.getItem('h_'+current.id) || "[]");
        h.push({role, content});
        localStorage.setItem('h_'+current.id, JSON.stringify(h));
    }

    // ENTER KEY LISTENER
    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { send(); }
    });

    renderGrid();
</script>
</body>
</html>
