<!DOCTYPE html>
<html>
<head>
    <title>AI Character Chat</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; }
        #chat-box { width: 400px; height: 500px; border: 1px solid #444; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #222; }
        .message { margin: 5px; padding: 8px; border-radius: 5px; }
        .user { background: #007bff; align-self: flex-end; }
        .ai { background: #444; }
        input { width: 320px; padding: 10px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Chat with AI</h2>
    <div id="chat-box"></div>
    <div>
        <input type="text" id="user-input" placeholder="Say something...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const API_KEY = "YOUR_API_KEY_HERE"; // Get one from OpenAI or OpenRouter

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value;
            if (!text) return;

            // Display user message
            chatBox.innerHTML += `<div class="message user">You: ${text}</div>`;
            input.value = '';

            // Call AI API
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "openai/gpt-3.5-turbo",
                    messages: [
                        { role: "system", content: "You are a friendly and helpful AI girl named Sakura." },
                        { role: "user", content: text }
                    ]
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;
            chatBox.innerHTML += `<div class="message ai">AI: ${aiText}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
