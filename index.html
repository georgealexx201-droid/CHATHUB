<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub | AI Companions</title>
    <style>
        :root { --pink: #ff2e63; --dark: #08080c; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Sidebar/Navigation */
        nav { width: 80px; height: 100vh; position: fixed; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .logo { font-weight: 900; color: var(--pink); margin-bottom: 40px; font-size: 1.5rem; }
        
        /* Main View */
        main { margin-left: 80px; padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding-bottom: 100px; }
        
        /* Character Cards */
        .card { background: var(--glass); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--pink); }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-info { padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); position: absolute; bottom: 0; width: 100%; }
        
        /* Chat Overlay */
        #chat-ui { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 2000; flex-direction: row; }
        .chat-left { width: 350px; border-right: 1px solid var(--border); padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        #messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 70%; padding: 12px 20px; border-radius: 20px; font-size: 0.95rem; line-height: 1.5; }
        .ai { background: var(--glass); border: 1px solid var(--border); align-self: flex-start; }
        .user { background: var(--pink); align-self: flex-end; }

        /* Input Bar */
        .input-bar { padding: 25px; display: flex; gap: 10px; background: var(--dark); border-top: 1px solid var(--border); }
        input { flex: 1; background: var(--glass); border: 1px solid var(--border); border-radius: 30px; padding: 15px 25px; color: white; outline: none; }
        button { background: var(--pink); border: none; padding: 10px 25px; border-radius: 30px; color: white; cursor: pointer; font-weight: bold; }
        
        .close-btn { position: absolute; top: 20px; left: 20px; cursor: pointer; font-size: 1.5rem; z-index: 2100; }
    </style>
</head>
<body>

<nav><div class="logo">C</div></nav>

<main>
    <h1 id="view-title">My AI Companions</h1>
    <div class="grid" id="character-grid"></div>
</main>

<div id="chat-ui">
    <div class="close-btn" onclick="closeChat()">✕</div>
    <div class="chat-left">
        <img id="char-img" style="width: 100%; border-radius: 20px;">
        <h2 id="char-name"></h2>
        <p id="char-bio" style="color: #888; text-align: center;"></p>
        <select id="vibe-selector" style="background: #111; color: var(--pink); border: 1px solid var(--pink); padding: 10px; border-radius: 10px; width: 100%;">
            <option value="Sweet">Sweet & Bubbly</option>
            <option value="Flirty">Flirty & Naughty</option>
            <option value="Cold">Cold & Distant</option>
        </select>
    </div>
    <div class="chat-main">
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button onclick="send()">Send</button>
        </div>
    </div>
</div>

<script>
    const companions = [
        { id: 1, name: "Sakura 🌸", role: "Artist", bio: "A free-spirited painter who sees the world in colors.", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Sakura" },
        { id: 2, name: "Luna 🎮", role: "Gamer", bio: "Pro gamer. Competitive, sharp, and very playful.", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Luna" },
        { id: 3, name: "Jade 💻", role: "Hacker", bio: "Mysterious tech genius who knows all your secrets.", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Jade" }
    ];

    let activeChar = null;

    function render() {
        document.getElementById('character-grid').innerHTML = companions.map(c => `
            <div class="card" onclick="startChat(${c.id})">
                <img src="${c.img}">
                <div class="card-info">
                    <b>${c.name}</b><br><small>${c.role}</small>
                </div>
            </div>
        `).join('');
    }

    function startChat(id) {
        activeChar = companions.find(c => c.id === id);
        document.getElementById('char-img').src = activeChar.img;
        document.getElementById('char-name').innerText = activeChar.name;
        document.getElementById('char-bio').innerText = activeChar.bio;
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('messages').innerHTML = `<div class="msg ai">Hey there! It's ${activeChar.name}. How are you today?</div>`;
    }

    function closeChat() { document.getElementById('chat-ui').style.display = 'none'; }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        const vibe = document.getElementById('vibe-selector').value;
        if (!text) return;

        const msgBox = document.getElementById('messages');
        msgBox.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        msgBox.scrollTop = msgBox.scrollHeight;

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: `You are ${activeChar.name}. Bio: ${activeChar.bio}. Current Mood: ${vibe}. Keep responses short and immersive.` },
                        { role: "user", content: text }
                    ]
                })
            });
            const data = await res.json();
            msgBox.innerHTML += `<div class="msg ai">${data.choices[0].message.content}</div>`;
        } catch (e) {
            msgBox.innerHTML += `<div class="msg ai">System Error: Check your OpenRouter key and credits!</div>`;
        }
        msgBox.scrollTop = msgBox.scrollHeight;
    }
    
    render();
</script>
</body>
</html>
