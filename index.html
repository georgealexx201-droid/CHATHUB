<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Pro Empire</title>
    <style>
        :root { --bg: #05040a; --card: #0f0d1f; --text: #ffffff; --accent: #f80759; --border: #1f1b3d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Header */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5, 4, 10, 0.9); backdrop-filter: blur(15px); position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.2rem; cursor: pointer; }
        .energy-pill { background: rgba(248, 7, 89, 0.1); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: var(--accent); font-weight: bold; }

        /* Discovery Grid */
        .main-content { padding: 25px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; height: 320px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Admin 3-Dot Menu */
        .menu-dots { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; color: white; cursor: pointer; }
        .dropdown { display: none; position: absolute; top: 45px; right: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; z-index: 20; width: 110px; }
        .dropdown button { width: 100%; padding: 10px; background: none; border: none; color: white; text-align: left; cursor: pointer; font-size: 0.75rem; border-bottom: 1px solid var(--border); }
        .dropdown button:hover { background: var(--accent); }

        /* Chat View */
        #chat-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; }
        .chat-layout { display: flex; height: 100%; max-width: 1400px; margin: 0 auto; width: 100%; }

        /* Profile Sidebar */
        .sidebar { width: 380px; border-right: 1px solid var(--border); padding: 40px 30px; overflow-y: auto; background: var(--card); display: flex; flex-direction: column; align-items: center; }
        .big-photo { width: 260px; height: 260px; border-radius: 25px; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 20px; }
        
        /* Chat Area */
        .chat-main { flex: 1; max-width: 500px; display: flex; flex-direction: column; background: #080712; border-right: 1px solid var(--border); border-left: 1px solid var(--border); margin: 0 auto; }
        
        /* NEW: Vibe Header */
        .chat-header { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #080712; height: 60px; }
        .back-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding-right: 15px; }
        .vibe-selector { background: #16142e; color: var(--accent); border: 1px solid var(--border); padding: 5px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; cursor: pointer; outline: none; }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; }
        .ai { background: var(--card); align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Typing & Modals */
        .typing { display: flex; gap: 4px; padding: 5px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

        .tabs { display: flex; width: 100%; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-size: 0.75rem; font-weight: bold; color: #555; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .gal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .locked-img { width: 100%; height: 110px; border-radius: 10px; background: #000; position: relative; overflow: hidden; }
        .locked-img img { width: 100%; height: 100%; object-fit: cover; filter: blur(20px); opacity: 0.4; }

        #admin-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9000; align-items:center; justify-content:center; }
        .modal-card { background: var(--card); padding: 30px; border-radius: 20px; width: 380px; border: 1px solid var(--border); }
        .admin-input { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 10px; margin: 8px 0; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">CHATHUB.AI</div>
    <div style="display:flex; align-items:center; gap:15px;">
        <button onclick="openAdmin()" style="background:var(--accent); border:none; color:white; padding:6px 15px; border-radius:20px; cursor:pointer; font-weight:bold; font-size:0.75rem;">+ NEW GIRL</button>
        <div class="energy-pill" id="energy-txt">⚡ 10 ENERGY</div>
    </div>
</header>

<div class="main-content">
    <div class="grid" id="char-grid"></div>
</div>

<div id="admin-modal">
    <div class="modal-card">
        <h2 id="modal-title" style="color:var(--accent); margin-top:0;">Character Config</h2>
        <input type="hidden" id="edit-id">
        <input type="text" id="admName" class="admin-input" placeholder="Name">
        <input type="text" id="admMood" class="admin-input" placeholder="Vibe (e.g. 😈 Naughty)">
        <input type="text" id="admImg" class="admin-input" placeholder="Main Photo URL">
        <input type="text" id="admGal" class="admin-input" placeholder="Gallery URLs (comma separated)">
        <textarea id="admBio" class="admin-input" placeholder="Bio & Instructions" rows="4"></textarea>
        <button onclick="saveCharacter()" style="background:var(--accent); color:white; border:none; padding:12px; width:100%; border-radius:10px; cursor:pointer; font-weight:bold;">SAVE CHANGES</button>
        <button onclick="closeAdmin()" style="background:none; border:none; color:#555; width:100%; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="chat-view">
    <div class="chat-layout">
        <div class="sidebar">
            <img id="side-photo" class="big-photo">
            <h2 id="side-name" style="margin:0"></h2>
            <div id="side-mood" style="color:var(--accent); font-weight:bold; margin:10px 0;"></div>
            <div class="tabs">
                <div id="t-p" class="tab active" onclick="setTab('p')">BIO</div>
                <div id="t-g" class="tab" onclick="setTab('g')">PHOTOS</div>
            </div>
            <div id="side-content" style="color:#aaa; font-size:0.85rem; text-align:center; line-height:1.5;"></div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header">
                <button class="back-btn" onclick="closeChat()">←</button>
                <div style="text-align:center;">
                    <div id="chat-header-name" style="font-weight:bold; font-size:0.9rem;"></div>
                    <select id="vibe-select" class="vibe-selector">
                        <option value="Romantic">💖 Romantic</option>
                        <option value="Naughty" selected>😈 Naughty</option>
                        <option value="Aggressive">🔥 Aggressive</option>
                        <option value="Angry">💢 Angry</option>
                    </select>
                </div>
                <div style="width:30px;"></div>
            </div>
            
            <div id="messages"></div>
            
            <div style="padding:20px; border-top:1px solid var(--border); display:flex; gap:10px;">
                <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off" style="flex:1; background:#16142e; border:1px solid var(--border); padding:12px 20px; color:white; border-radius:25px; outline:none;">
                <button onclick="send()" style="background:var(--accent); border:none; color:white; width:45px; height:45px; border-radius:50%; cursor:pointer;">➔</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Keeping all the original characters we built
    let characters = JSON.parse(localStorage.getItem('empire_final_db')) || [
        { id: 1, name: "Sakura 🌸", mood: "FRISKY 🔥", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600", gallery: ["https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=400"], bio: "The artist who loves forbidden sketches." },
        { id: 2, name: "Luna 🎮", mood: "DOMINANT 😈", photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=600", gallery: [], bio: "High stakes gamer. Play for keeps." },
        { id: 3, name: "Zara 🐍", mood: "EXOTIC 💃", photo: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600", gallery: [], bio: "Brazilian dancer with no limits." },
        { id: 4, name: "Elena 📚", mood: "CLASSY 📖", photo: "https://images.unsplash.com/photo-1524250502761-1ac6f2e30d43?w=600", gallery: [], bio: "Professor with a very late-night schedule." }
    ];
    let energy = localStorage.getItem('energy') || 10;
    let current = null;

    function renderGrid() {
        const grid = document.getElementById('char-grid');
        grid.innerHTML = characters.map(c => `
            <div class="card" onclick="openChat(${c.id})">
                <div class="menu-dots" onclick="toggleMenu(event, ${c.id})">⋮</div>
                <div class="dropdown" id="drop-${c.id}">
                    <button onclick="editChar(event, ${c.id})">Edit</button>
                    <button onclick="deleteChar(event, ${c.id})" style="color:red;">Delete</button>
                </div>
                <img src="${c.photo}">
                <div style="position:absolute; bottom:0; width:100%; padding:15px; background:linear-gradient(transparent, #000);">
                    <b>${c.name}</b><br><small style="color:var(--accent);">${c.mood}</small>
                </div>
            </div>`).join('');
    }

    function toggleMenu(e, id) { e.stopPropagation(); document.querySelectorAll('.dropdown').forEach(d => d.style.display='none'); document.getElementById('drop-'+id).style.display='block'; }
    function openAdmin() { document.getElementById('admin-modal').style.display='flex'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display='none'; resetForm(); }
    function resetForm() { document.getElementById('edit-id').value=""; document.getElementById('admName').value=""; document.getElementById('admMood').value=""; document.getElementById('admImg').value=""; document.getElementById('admGal').value=""; document.getElementById('admBio').value=""; }

    function saveCharacter() {
        const id = document.getElementById('edit-id').value;
        const galStr = document.getElementById('admGal').value;
        const data = {
            id: id ? parseInt(id) : Date.now(),
            name: document.getElementById('admName').value,
            mood: document.getElementById('admMood').value,
            photo: document.getElementById('admImg').value,
            gallery: galStr ? galStr.split(',') : [],
            bio: document.getElementById('admBio').value
        };
        if(id) { const i = characters.findIndex(c => c.id == id); characters[i] = data; }
        else { characters.push(data); }
        localStorage.setItem('empire_final_db', JSON.stringify(characters));
        renderGrid(); closeAdmin();
    }

    function editChar(e, id) {
        e.stopPropagation();
        const c = characters.find(char => char.id == id);
        document.getElementById('modal-title').innerText = "Edit Girl";
        document.getElementById('edit-id').value = c.id;
        document.getElementById('admName').value = c.name;
        document.getElementById('admMood').value = c.mood;
        document.getElementById('admImg').value = c.photo;
        document.getElementById('admGal').value = c.gallery ? c.gallery.join(',') : "";
        document.getElementById('admBio').value = c.bio;
        openAdmin();
    }

    function deleteChar(e, id) { e.stopPropagation(); if(confirm("Delete her?")) { characters = characters.filter(c => c.id != id); localStorage.setItem('empire_final_db', JSON.stringify(characters)); renderGrid(); } }

    function openChat(id) {
        current = characters.find(c => c.id == id);
        document.getElementById('side-photo').src = current.photo;
        document.getElementById('side-name').innerText = current.name;
        document.getElementById('chat-header-name').innerText = current.name;
        document.getElementById('side-mood').innerText = current.mood;
        document.getElementById('chat-view').style.display = 'block';
        setTab('p');
        document.getElementById('messages').innerHTML = `<div class="msg ai">You're back... I was just thinking about you.</div>`;
    }

    function setTab(t) {
        document.getElementById('t-p').className = t==='p'?'tab active':'tab';
        document.getElementById('t-g').className = t==='g'?'tab active':'tab';
        const content = document.getElementById('side-content');
        if(t==='p') { content.innerHTML = `<p>${current.bio}</p>`; }
        else {
            let galHtml = '<div class="gal-grid">';
            (current.gallery || []).forEach(img => {
                galHtml += `<div class="locked-img"><img src="${img}"><div style="position:absolute; top:35%; width:100%; text-align:center; font-weight:bold; color:white;">🔒 100⚡</div></div>`;
            });
            content.innerHTML = galHtml + '</div>';
        }
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        const currentVibe = document.getElementById('vibe-select').value;
        if(!text || energy <= 0) return;

        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;

        const tid = "dots-" + Date.now();
        box.innerHTML += `<div class="msg ai" id="${tid}"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch("/api/chat.mjs", { 
                method: "POST", 
                body: JSON.stringify({ 
                    character: current.name, 
                    message: text, 
                    bio: current.bio,
                    vibe: currentVibe // SENDING THE VIBE TO THE AI
                }) 
            });
            const data = await res.json();
            document.getElementById(tid).remove();
            
            const aiMsg = document.createElement('div'); aiMsg.className = 'msg ai'; box.appendChild(aiMsg);
            let i = 0;
            function type() { if (i < data.reply.length) { aiMsg.innerHTML += data.reply.charAt(i); i++; box.scrollTop = box.scrollHeight; setTimeout(type, 20); } }
            type();
            energy--; document.getElementById('energy-txt').innerText = `⚡ ${energy} ENERGY`;
            localStorage.setItem('energy', energy);
        } catch (e) { document.getElementById(tid).innerText = "Error..."; }
    }

    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }
    window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.style.display='none');
    document.getElementById('userInput').addEventListener('keydown', (e) => { if(e.key==='Enter') send(); });
    renderGrid();
</script>
</body>
</html>
