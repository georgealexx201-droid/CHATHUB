<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Final Empire Edition</title>
    <style>
        :root { --bg: #05040a; --card: #0f0d1f; --text: #ffffff; --accent: #f80759; --border: #1f1b3d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Header */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5, 4, 10, 0.9); backdrop-filter: blur(15px); position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.2rem; cursor: pointer; }
        .energy-pill { background: rgba(248, 7, 89, 0.1); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: var(--accent); font-weight: bold; display: flex; align-items: center; gap: 8px; }

        /* Discovery Grid */
        .main-content { padding: 25px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; height: 320px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Admin 3-Dot Menu */
        .menu-dots { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; color: white; cursor: pointer; }
        .menu-dots:hover { background: var(--accent); }
        .dropdown { display: none; position: absolute; top: 45px; right: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; z-index: 20; width: 110px; overflow: hidden; }
        .dropdown button { width: 100%; padding: 10px; background: none; border: none; color: white; text-align: left; cursor: pointer; font-size: 0.75rem; border-bottom: 1px solid var(--border); }
        .dropdown button:hover { background: var(--accent); }

        /* Full Chat Dashboard */
        #chat-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; }
        .chat-layout { display: flex; height: 100%; max-width: 1400px; margin: 0 auto; width: 100%; }

        /* Side 1: Large Profile Photo */
        .sidebar { width: 400px; border-right: 1px solid var(--border); padding: 40px 30px; overflow-y: auto; background: var(--card); display: flex; flex-direction: column; align-items: center; }
        .big-photo { width: 280px; height: 280px; border-radius: 30px; object-fit: cover; border: 3px solid var(--accent); box-shadow: 0 0 20px rgba(248,7,89,0.3); margin-bottom: 20px; }
        
        /* Side 2: Phone-Style Narrow Chat */
        .chat-main { flex: 1; max-width: 500px; display: flex; flex-direction: column; background: #080712; border-right: 1px solid var(--border); border-left: 1px solid var(--border); margin: 0 auto; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        /* Bubbles & Typing */
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; }
        .ai { background: var(--card); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }

        .typing { display: flex; gap: 4px; padding: 5px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

        /* Input area */
        .input-box { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: #080712; }
        #userInput { flex: 1; background: #16142e; border: 1px solid var(--border); border-radius: 25px; padding: 12px 20px; color: white; outline: none; }

        /* Modals */
        #modal-overlay, #admin-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:5000; align-items:center; justify-content:center; backdrop-filter: blur(5px); }
        .modal-card { background: var(--card); padding: 30px; border-radius: 20px; width: 380px; border: 1px solid var(--border); text-align: center; }
        .admin-input { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 10px; margin: 10px 0; border-radius: 8px; box-sizing: border-box; }
        
        @media (max-width: 900px) { .sidebar { display: none; } .chat-main { max-width: 100%; } }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">CHATHUB.AI</div>
    <div style="display:flex; align-items:center; gap:15px;">
        <button onclick="openAdmin()" style="background:var(--accent); border:none; color:white; padding:6px 15px; border-radius:20px; cursor:pointer; font-weight:bold; font-size:0.75rem;">+ ADD CHARACTER</button>
        <div class="energy-pill">
            <span id="energy-txt">⚡ 10 ENERGY</span>
            <button onclick="openShop()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:bold; font-size:1.2rem; padding:0 5px;">+</button>
        </div>
    </div>
</header>

<div class="main-content">
    <div class="grid" id="char-grid"></div>
</div>

<div id="admin-modal">
    <div class="modal-card">
        <h2 id="modal-title" style="color:var(--accent); margin-top:0;">New Girl</h2>
        <input type="hidden" id="edit-id">
        <input type="text" id="admName" class="admin-input" placeholder="Name (e.g. Mia 🌸)">
        <input type="text" id="admMood" class="admin-input" placeholder="Mood (e.g. 🔥 Frisky)">
        <input type="text" id="admImg" class="admin-input" placeholder="Direct Photo URL (.jpg / .png)">
        <textarea id="admBio" class="admin-input" placeholder="Her Personality/Bio" rows="4"></textarea>
        <button onclick="saveCharacter()" style="background:var(--accent); color:white; border:none; padding:12px; width:100%; border-radius:10px; cursor:pointer; font-weight:bold;">SAVE TO GRID</button>
        <button onclick="closeAdmin()" style="background:none; border:none; color:#555; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-card">
        <h2 style="color:var(--accent); margin-top:0;">Refill Energy</h2>
        <button onclick="stripeBuy(50)" style="background:#16142e; color:white; border:1px solid var(--border); padding:12px; width:100%; margin:8px 0; border-radius:10px; cursor:pointer;">⚡ 50 Energy - $4.99</button>
        <button onclick="stripeBuy(200)" style="background:#16142e; color:white; border:1px solid var(--accent); padding:12px; width:100%; margin:8px 0; border-radius:10px; cursor:pointer;">⚡ 200 Energy - $14.99</button>
        <button onclick="document.getElementById('modal-overlay').style.display='none'" style="background:none; border:none; color:#555; margin-top:10px; cursor:pointer;">Close</button>
    </div>
</div>

<div id="chat-view">
    <div class="chat-layout">
        <div class="sidebar">
            <img id="side-photo" class="big-photo">
            <h2 id="side-name" style="margin:0"></h2>
            <div id="side-mood" style="background:linear-gradient(90deg, #ff00cc, #3333ff); padding:5px 15px; border-radius:10px; font-size:0.7rem; font-weight:bold; margin:20px 0;"></div>
            <p id="side-bio" style="color:#aaa; font-size:0.9rem; text-align:center; line-height:1.6;"></p>
            <button onclick="closeChat()" style="background:var(--border); color:white; border:none; padding:12px; width:100%; border-radius:10px; cursor:pointer; margin-top:30px; font-weight:bold;">✕ EXIT CHAT</button>
        </div>
        <div class="chat-main">
            <div id="messages"></div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
                <button onclick="send()" style="background:var(--accent); border:none; color:white; width:45px; height:45px; border-radius:50%; cursor:pointer;">➔</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Database with your original girls + new ones
    let characters = JSON.parse(localStorage.getItem('my_empire_db')) || [
        { id: 1, name: "Sakura 🌸", mood: "FRISKY 🔥", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600", bio: "Innocent artist by day, absolute trouble by night." },
        { id: 2, name: "Luna 🎮", mood: "DOMINANT 😈", photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=600", bio: "High stakes gamer. She doesn't just want to win the game, she wants to win you." },
        { id: 3, name: "Zara 🐍", mood: "EXOTIC 💃", photo: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600", bio: "Professional dancer with a very flexible set of rules." }
    ];

    let energy = localStorage.getItem('energy') || 10;
    let current = null;

    function renderGrid() {
        const grid = document.getElementById('char-grid');
        grid.innerHTML = characters.map(c => `
            <div class="card" onclick="openChat(${c.id})">
                <div class="menu-dots" onclick="toggleMenu(event, ${c.id})">⋮</div>
                <div class="dropdown" id="drop-${c.id}">
                    <button onclick="editChar(event, ${c.id})">Edit</button>
                    <button onclick="deleteChar(event, ${c.id})" style="color:#f80759;">Delete</button>
                </div>
                <img src="${c.photo}" onerror="this.src='https://via.placeholder.com/300x500?text=Image+URL+Error'">
                <div style="position:absolute; bottom:0; width:100%; padding:15px; background:linear-gradient(transparent, #000);">
                    <b style="font-size:1.1rem;">${c.name}</b><br>
                    <small style="color:var(--accent); font-weight:bold;">${c.mood}</small>
                </div>
            </div>
        `).join('');
    }

    // Admin Menu Logic
    function toggleMenu(e, id) {
        e.stopPropagation();
        const drop = document.getElementById('drop-' + id);
        const isOpen = drop.style.display === 'block';
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        drop.style.display = isOpen ? 'none' : 'block';
    }

    function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; resetForm(); }
    function resetForm() { document.getElementById('edit-id').value=""; document.getElementById('modal-title').innerText="New Girl"; document.getElementById('admName').value=""; document.getElementById('admMood').value=""; document.getElementById('admImg').value=""; document.getElementById('admBio').value=""; }

    function saveCharacter() {
        const id = document.getElementById('edit-id').value;
        const data = {
            id: id ? parseInt(id) : Date.now(),
            name: document.getElementById('admName').value,
            mood: document.getElementById('admMood').value,
            photo: document.getElementById('admImg').value,
            bio: document.getElementById('admBio').value
        };
        if(id) {
            const i = characters.findIndex(c => c.id == id);
            characters[i] = data;
        } else { characters.push(data); }
        localStorage.setItem('my_empire_db', JSON.stringify(characters));
        renderGrid(); closeAdmin();
    }

    function editChar(e, id) {
        e.stopPropagation();
        const c = characters.find(char => char.id == id);
        document.getElementById('modal-title').innerText = "Edit Girl";
        document.getElementById('edit-id').value = c.id;
        document.getElementById('admName').value = c.name;
        document.getElementById('admMood').value = c.mood;
        document.getElementById('admImg').value = c.photo;
        document.getElementById('admBio').value = c.bio;
        openAdmin();
    }

    function deleteChar(e, id) {
        e.stopPropagation();
        if(confirm("Delete this girl from your empire?")) {
            characters = characters.filter(c => c.id != id);
            localStorage.setItem('my_empire_db', JSON.stringify(characters));
            renderGrid();
        }
    }

    // Chat Interface Logic
    function openChat(id) {
        current = characters.find(c => c.id == id);
        document.getElementById('side-photo').src = current.photo;
        document.getElementById('side-name').innerText = current.name;
        document.getElementById('side-mood').innerText = current.mood;
        document.getElementById('side-bio').innerText = current.bio;
        document.getElementById('chat-view').style.display = 'block';
        document.getElementById('messages').innerHTML = `<div class="msg ai">I was wondering when you'd show up... what's on your mind?</div>`;
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text || energy <= 0) { if(energy<=0) openShop(); return; }

        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;

        // Bouncing Dots Animation
        const tid = "dots-" + Date.now();
        box.innerHTML += `<div class="msg ai" id="${tid}"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch("/api/chat.mjs", {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ character: current.name, message: text, bio: current.bio, history: [] })
            });
            const data = await res.json();
            document.getElementById(tid).remove();
            
            // Typewriter Effect
            const aiMsg = document.createElement('div');
            aiMsg.className = 'msg ai';
            box.appendChild(aiMsg);
            let i = 0;
            function type() {
                if (i < data.reply.length) {
                    aiMsg.innerHTML += data.reply.charAt(i);
                    i++; box.scrollTop = box.scrollHeight;
                    setTimeout(type, 20);
                }
            }
            type();
            energy--; updateEnergy();
        } catch (e) { document.getElementById(tid).innerText = "Disconnected..."; }
    }

    function updateEnergy() { document.getElementById('energy-txt').innerText = `⚡ ${energy} ENERGY`; localStorage.setItem('energy', energy); }
    function openShop() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }
    
    // Stripe Logic
    async function stripeBuy(amt) {
        const res = await fetch('/api/checkout.mjs', { method: 'POST', body: JSON.stringify({amount: amt}) });
        const s = await res.json();
        if(s.url) window.location.href = s.url;
    }

    // Keyboard ENTER listener
    document.getElementById('userInput').addEventListener('keydown', (e) => { if(e.key==='Enter') send(); });
    window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');

    renderGrid();
    updateEnergy();
</script>
</body>
</html>
