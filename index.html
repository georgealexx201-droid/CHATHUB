<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyHub AI | Your Virtual Companions</title>
    <style>
        :root { --accent: #ff2e63; --bg: #0a0a0c; --card: #16161a; --border: rgba(255,255,255,0.1); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        
        /* Layout */
        header { padding: 20px 40px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        
        main { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .hero { text-align: center; margin-bottom: 50px; }
        
        /* Character Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 24px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(255,46,99,0.2); }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-meta { padding: 20px; background: linear-gradient(transparent, #000); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        
        /* Chat Overlay */
        #chat-ui { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 9999; flex-direction: row; }
        .chat-sidebar { width: 350px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #0f0f12; }
        
        #messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 75%; padding: 14px 20px; border-radius: 20px; font-size: 0.95rem; }
        .ai { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }

        .input-area { padding: 30px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        input { flex: 1; background: #1c1c21; border: 1px solid var(--border); border-radius: 15px; padding: 15px; color: white; outline: none; }
        .send-btn { background: var(--accent); border: none; padding: 0 25px; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; }
        
        .close-btn { position: absolute; top: 20px; right: 20px; color: white; font-size: 2rem; cursor: pointer; opacity: 0.5; }
        .close-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<header>
    <div class="logo">CANDYHUB.AI</div>
</header>

<main>
    <div class="hero">
        <h1>Find Your AI Companion</h1>
        <p style="color: #888;">Immersive conversations with characters that remember you.</p>
    </div>
    <div class="grid" id="character-grid"></div>
</main>

<div id="chat-ui">
    <div class="close-btn" onclick="closeChat()">×</div>
    <div class="chat-sidebar">
        <img id="side-img" style="width: 200px; height: 200px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent);">
        <h2 id="side-name" style="margin-top: 20px;"></h2>
        <p id="side-bio" style="color: #888; text-align: center; font-size: 0.9rem;"></p>
        <div style="margin-top: auto; width: 100%;">
            <label style="font-size: 0.7rem; color: var(--accent); font-weight: bold;">CHARACTER MOOD</label>
            <select id="vibe" style="width: 100%; background: #111; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 10px; margin-top: 5px;">
                <option value="Loving">🥰 Loving & Sweet</option>
                <option value="Spicy">🔥 Spicy & Bold</option>
                <option value="Shy">😳 Shy & Quiet</option>
            </select>
        </div>
    </div>
    <div class="chat-main">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Send a message...">
            <button class="send-btn" onclick="send()">Send</button>
        </div>
    </div>
</div>

<script>
    const companions = [
        { id: 1, name: "Sakura", bio: "A bubbly art student with a secret crush on you.", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Sakura" },
        { id: 2, name: "Luna", bio: "The world's top gamer. She's competitive but has a soft side.", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Luna" },
        { id: 3, name: "Elena", bio: "A mysterious librarian who speaks in riddles and poetry.", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Elena" }
    ];

    let current = null;

    function init() {
        document.getElementById('character-grid').innerHTML = companions.map(c => `
            <div class="card" onclick="openChat(${c.id})">
                <img src="${c.img}">
                <div class="card-meta">
                    <div style="font-size: 1.2rem; font-weight: bold;">${c.name}</div>
                    <div style="font-size: 0.8rem; opacity: 0.7;">Online Now</div>
                </div>
            </div>
        `).join('');
    }

    function openChat(id) {
        current = companions.find(c => c.id === id);
        document.getElementById('side-img').src = current.img;
        document.getElementById('side-name').innerText = current.name;
        document.getElementById('side-bio').innerText = current.bio;
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('messages').innerHTML = `<div class="msg ai">Hey! It's ${current.name}. I've been waiting to talk to you...</div>`;
    }

    function closeChat() { document.getElementById('chat-ui').style.display = 'none'; }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        const mood = document.getElementById('vibe').value;
        if (!text) return;

        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: `You are ${current.name}. Bio: ${current.bio}. Mood: ${mood}. Reply in character with short, engaging messages.` },
                        { role: "user", content: text }
                    ]
                })
            });
            const data = await res.json();
            box.innerHTML += `<div class="msg ai">${data.choices[0].message.content}</div>`;
        } catch (e) {
            box.innerHTML += `<div class="msg ai">I'm having trouble connecting... check your key!</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    init();
</script>
</body>
</html>
