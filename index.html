<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub AI | Discover Your AI</title>
    <style>
        :root { 
            --bg: #0f0c29; 
            --card-bg: #1a1a2e;
            --text: #ffffff; 
            --accent: #bc4e9c; /* Pink-Purple glow */
            --border: #30304b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Premium Header */
        header { 
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            text-align: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Modern Grid */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto;
        }
        .profile-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 15px; 
            overflow: hidden; 
            position: relative;
            transition: 0.3s;
        }
        .profile-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        .img-container { width: 100%; padding-top: 140%; position: relative; }
        .img-container img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        
        /* Status Badge */
        .badge {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0, 255, 136, 0.8);
            color: black; font-size: 0.6rem; font-weight: bold;
            padding: 4px 8px; border-radius: 20px; text-transform: uppercase;
        }

        .card-info { padding: 12px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        .card-info h3 { margin: 0; font-size: 1rem; }
        .card-info p { margin: 2px 0 0; font-size: 0.75rem; color: #ccc; }

        /* Full Screen Chat */
        #chat-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 200; display: none; flex-direction: column; }
        #chat-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; line-height: 1.4; }
        .ai { background: var(--border); color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        #input-area { padding: 20px; background: var(--card-bg); display: flex; gap: 10px; }
        input { flex: 1; background: #0f0c29; border: 1px solid var(--border); border-radius: 25px; padding: 12px 20px; color: white; outline: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">CHATHUB.AI</div>
</header>

<div id="grid-screen" class="active-screen">
    <div class="grid-container" id="gridContainer"></div>
</div>

<div id="chat-screen">
    <div id="chat-header">
        <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.5rem;">←</button>
        <div id="header-name" style="font-weight:bold;"></div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Type a message...">
        <button onclick="sendMessage()" style="background:var(--accent); border:none; color:white; padding:10px 20px; border-radius:25px; font-weight:bold;">Send</button>
    </div>
</div>

<script>
    const characters = [
        { id: 1, name: "Sakura 🌸", bio: "Artist", badge: "Online", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500", greeting: "Hey! I'm working on a new painting. Want to see?" },
        { id: 2, name: "Luna 🎮", bio: "Gamer", badge: "Popular", photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=500", greeting: "Just finished a 12-hour stream. I'm exhausted but wired. You up?" },
        { id: 3, name: "Elena 📚", bio: "Writer", badge: "New", photo: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500", greeting: "The rain outside is perfect for reading. Do you have a favorite poem?" },
        { id: 4, name: "Coach Jax 🏋️", bio: "Fitness", badge: "Online", photo: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=500", greeting: "No excuses today! Did you hit your goals yet?" }
    ];

    let currentAi = null;
    let chatHistory = [];

    function init() {
        document.getElementById('gridContainer').innerHTML = characters.map(c => `
            <div class="profile-card" onclick="startChat(${c.id})">
                <div class="badge">${c.badge}</div>
                <div class="img-container"><img src="${c.photo}"></div>
                <div class="card-info">
                    <h3>${c.name}</h3>
                    <p>${c.bio}</p>
                </div>
            </div>`).join('');
    }

    function startChat(id) {
        currentAi = characters.find(c => c.id === id);
        chatHistory = [];
        document.getElementById('header-name').innerText = currentAi.name;
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('messages').innerHTML = `<div class="msg ai">${currentAi.greeting}</div>`;
    }

    function closeChat() {
        document.getElementById('chat-screen').style.display = 'none';
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        
        // Add typing indicator
        const typingId = "t-" + Date.now();
        msgDiv.innerHTML += `<div class="msg ai" id="${typingId}">...</div>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;

        try {
            const response = await fetch("/api/chat.mjs", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ character: currentAi.name, bio: currentAi.bio, message: text, history: chatHistory })
            });
            const data = await response.json();
            document.getElementById(typingId).remove();
            msgDiv.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            chatHistory.push({ role: "user", content: text }, { role: "assistant", content: data.reply });
        } catch (e) {
            document.getElementById(typingId).innerText = "Error!";
        }
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    init();
</script>
</body>
</html>
