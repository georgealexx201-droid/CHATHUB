<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Discovery</title>
    <style>
        :root { 
            --bg: #0b091a; 
            --card-bg: #161233;
            --text: #ffffff; 
            --accent: #f80759; 
            --border: #2a2456;
            --online: #00ff88;
        }
        
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Premium Navigation */
        header { 
            background: rgba(11, 9, 26, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: 1px; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Category Bar */
        .filter-bar { 
            display: flex; gap: 12px; padding: 15px 20px; 
            overflow-x: auto; scrollbar-width: none;
            background: var(--bg); border-bottom: 1px solid var(--border);
        }
        .filter-btn { 
            background: var(--card-bg); border: 1px solid var(--border); 
            color: #aaa; padding: 8px 18px; border-radius: 20px; 
            cursor: pointer; font-size: 0.85rem; transition: 0.3s;
        }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 15px rgba(248, 7, 89, 0.3); }

        /* Discovery Grid */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto;
        }
        .profile-card { 
            background: var(--card-bg); border-radius: 16px; 
            overflow: hidden; position: relative; transition: 0.3s;
            border: 1px solid var(--border); cursor: pointer;
        }
        .profile-card:hover { transform: scale(1.03); border-color: var(--accent); }
        
        .img-container { width: 100%; padding-top: 130%; position: relative; }
        .img-container img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        
        .status-dot { width: 8px; height: 8px; background: var(--online); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px var(--online); }
        
        .card-info { 
            position: absolute; bottom: 0; width: 100%; 
            padding: 20px 12px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        .card-info h3 { margin: 0; font-size: 1rem; }
        .card-info p { margin: 4px 0 0; font-size: 0.75rem; color: #bbb; }

        /* Full Screen Chat View */
        #chat-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 1000; display: none; flex-direction: column; 
        }
        #chat-header { 
            padding: 15px; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; 
        }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 80%; line-height: 1.5; font-size: 0.95rem; }
        .ai { background: var(--card-bg); color: white; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .input-container { padding: 20px; background: var(--bg); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; background: var(--card-bg); border: 1px solid var(--border); border-radius: 30px; padding: 14px 20px; color: white; outline: none; }
        .send-btn { background: var(--accent); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">CHATHUB.AI</div>
    <div style="font-size: 0.8rem; color: var(--online);">● 1,242 Online</div>
</header>

<div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="filterData('All')">All</button>
    <button class="filter-btn" onclick="filterData('Creative')">Creative</button>
    <button class="filter-btn" onclick="filterData('Gaming')">Gaming</button>
    <button class="filter-btn" onclick="filterData('Professional')">Professional</button>
</div>

<div id="grid-screen">
    <div class="grid-container" id="gridContainer"></div>
</div>

<div id="chat-screen">
    <div id="chat-header">
        <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">✕</button>
        <div id="active-char-name" style="font-weight:bold; font-size:1.1rem;"></div>
        <div style="width:30px"></div>
    </div>
    <div id="messages"></div>
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Message...">
        <button class="send-btn" onclick="sendMessage()">➔</button>
    </div>
</div>

<script>
    const characters = [
        { id: 1, name: "Sakura 🌸", category: "Creative", bio: "Artist in Tokyo. Soft-spoken and imaginative.", greeting: "I was just mixing some colors for a new piece... what's on your mind?", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500" },
        { id: 2, name: "Luna 🎮", category: "Gaming", bio: "Competitive gamer. Brutally honest and energetic.", greeting: "You better not be a noob. Ready to carry me?", photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=500" },
        { id: 3, name: "Elena 📚", category: "Creative", bio: "Poet and dreamer. Loves rain and philosophy.", greeting: "The world feels so quiet today. Do you ever feel like time is standing still?", photo: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500" },
        { id: 4, name: "Coach Jax 🏋️", category: "Professional", bio: "High-performance trainer. Motivating and direct.", greeting: "Stop scrolling and start doing. What's the goal for today?", photo: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=500" },
        { id: 5, name: "Chef Marco 👨‍🍳", category: "Professional", bio: "Gourmet chef. Passionate about Italian cuisine.", greeting: "Ciao! I have the pasta boiling. What flavors are you craving?", photo: "https://images.unsplash.com/photo-1583394238182-6f3ad36b51a0?w=500" },
        { id: 6, name: "Zara 💻", category: "Professional", bio: "Cybersecurity expert. Sharp, witty, and mysterious.", greeting: "Careful where you click. I've already seen your firewall... just kidding. Mostly.", photo: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=500" }
    ];

    let currentAi = null;
    let chatHistory = [];

    function renderGrid(list) {
        const container = document.getElementById('gridContainer');
        container.innerHTML = list.map(c => `
            <div class="profile-card" onclick="openChat(${c.id})">
                <div class="img-container"><img src="${c.photo}"></div>
                <div class="card-info">
                    <h3><span class="status-dot"></span>${c.name}</h3>
                    <p>${c.category}</p>
                </div>
            </div>
        `).join('');
    }

    function filterData(category) {
        // Update Buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === category);
        });
        
        if(category === 'All') renderGrid(characters);
        else renderGrid(characters.filter(c => c.category === category));
    }

    function openChat(id) {
        currentAi = characters.find(c => c.id === id);
        chatHistory = [];
        document.getElementById('active-char-name').innerText = currentAi.name;
        document.getElementById('messages').innerHTML = `<div class="msg ai">${currentAi.greeting}</div>`;
        document.getElementById('chat-screen').style.display = 'flex';
    }

    function closeChat() {
        document.getElementById('chat-screen').style.display = 'none';
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        
        const typingId = "t-" + Date.now();
        msgDiv.innerHTML += `<div class="msg ai" id="${typingId}"><i>Typing...</i></div>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;

        try {
            const response = await fetch("/api/chat.mjs", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    character: currentAi.name, 
                    bio: currentAi.bio, 
                    message: text, 
                    history: chatHistory 
                })
            });
            const data = await response.json();
            document.getElementById(typingId).remove();
            
            if(data.reply) {
                msgDiv.innerHTML += `<div class="msg ai">${data.reply}</div>`;
                chatHistory.push({ role: "user", content: text }, { role: "assistant", content: data.reply });
            }
        } catch (e) {
            document.getElementById(typingId).innerText = "System lag. Please try again.";
        }
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    // Initial render
    renderGrid(characters);
</script>
</body>
</html>
