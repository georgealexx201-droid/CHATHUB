<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Private Companion</title>
    <style>
        :root { --bg: #070514; --card: #120e2e; --text: #ffffff; --accent: #f80759; --border: #251f4d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        
        /* Header & Navigation */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(7, 5, 20, 0.9); backdrop-filter: blur(10px); position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.3rem; cursor: pointer; }
        
        .header-right { display: flex; align-items: center; gap: 15px; }
        #energy-display { background: rgba(248, 7, 89, 0.1); border: 1px solid var(--accent); padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .refill-btn { background: var(--accent); border: none; color: white; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-weight: bold; font-size: 1rem; line-height: 1; }

        /* Discovery Grid */
        .main-content { height: calc(100vh - 70px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .top-controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .search-bar { background: var(--card); border: 1px solid var(--border); color: white; border-radius: 12px; padding: 12px 20px; width: 100%; max-width: 400px; outline: none; }
        
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-btn { background: var(--card); border: 1px solid var(--border); color: #888; padding: 8px 18px; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 15px rgba(248, 7, 89, 0.3); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; overflow: hidden; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-meta { padding: 12px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); position: absolute; bottom:0; width: 100%; box-sizing: border-box; }

        /* Chat Dashboard */
        #chat-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; }
        .chat-layout { display: flex; width: 100%; height: 100%; }
        
        .chat-main { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: #0a081d; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 75%; font-size: 0.95rem; line-height: 1.5; }
        .ai { background: var(--card); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
        .user { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }

        .input-box { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--bg); }
        .input-box input { flex: 1; background: #000; border: 1px solid var(--border); border-radius: 25px; padding: 14px 20px; color: white; outline: none; }

        /* Sidebar & Tabs */
        .chat-sidebar { width: 340px; display: flex; flex-direction: column; background: var(--card); border-left: 1px solid var(--border); }
        .sidebar-scroll { padding: 25px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .side-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 15px; }
        
        .tab-container { display: flex; width: 100%; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 0.75rem; font-weight: bold; color: #666; transition: 0.3s; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }
        .gallery-item { position: relative; border-radius: 10px; overflow: hidden; height: 110px; background: #000; border: 1px solid var(--border); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .locked { filter: blur(12px) grayscale(1); opacity: 0.4; }
        .lock-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.2rem; filter: none; }

        .mood-badge { background: linear-gradient(90deg, #ff00cc, #3333ff); padding: 8px 15px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; margin: 15px 0; width: 100%; text-align: center; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .tag { background: var(--border); padding: 5px 12px; border-radius: 15px; font-size: 0.7rem; color: #bbb; }

        /* Shop Modal */
        #shop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; padding: 20px; }
        .shop-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 400px; padding: 30px; text-align: center; }
        .shop-option { background: var(--bg); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; box-sizing: border-box; display: block; }
        .shop-option:hover { border-color: var(--accent); background: rgba(248, 7, 89, 0.05); }

        @media (max-width: 900px) { .chat-sidebar { display: none; } }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">CHATHUB.AI</div>
    <div class="header-right">
        <div id="energy-display">⚡ 10 ENERGY</div>
        <button class="refill-btn" onclick="openShop()">+</button>
    </div>
</header>

<div class="main-content" id="main-grid">
    <div class="top-controls">
        <input type="text" id="searchInput" class="search-bar" placeholder="Search by name or vibe..." oninput="updateUI()">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="setCat('All', this)">All</button>
            <button class="filter-btn" onclick="setCat('Spicy', this)">Spicy 🔥</button>
            <button class="filter-btn" onclick="setCat('Gaming', this)">Gaming 🎮</button>
            <button class="filter-btn" onclick="setCat('Intellectual', this)">Intellectual 📚</button>
        </div>
    </div>
    <div class="grid" id="char-grid"></div>
</div>

<div id="chat-view">
    <div class="chat-layout">
        <div class="chat-main">
            <div class="chat-header">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">✕</button>
                <div id="chat-name-top" style="font-weight:bold; letter-spacing:1px;"></div>
                <button onclick="resetChat()" style="background:none; border:none; color:var(--accent); font-size:0.7rem; cursor:pointer;">RESET</button>
            </div>
            <div id="messages"></div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Message your companion...">
                <button onclick="sendMsg()" style="background:var(--accent); border:none; color:white; padding:10px 25px; border-radius:25px; font-weight:bold; cursor:pointer;">Send</button>
            </div>
        </div>

        <div class="chat-sidebar">
            <div class="sidebar-scroll">
                <img id="side-photo" class="side-img">
                <h2 id="side-name" style="margin:0; font-size: 1.4rem;"></h2>
                <div id="mood-box"></div>
                <div class="tab-container">
                    <div id="t-prof" class="tab active" onclick="switchTab('profile')">PROFILE</div>
                    <div id="t-gal" class="tab" onclick="switchTab('gallery')">PHOTOS</div>
                </div>
                <div id="side-content" style="width:100%"></div>
            </div>
        </div>
    </div>
</div>

<div id="shop-modal">
    <div class="shop-card">
        <h2 style="color:var(--accent); margin-top:0;">Refill Energy</h2>
        <p style="color:#888; margin-bottom:25px;">The girls are waiting. Don't run out now.</p>
        <button class="shop-option" onclick="processBuy(50, 4.99)">⚡ 50 Energy - $4.99</button>
        <button class="shop-option" onclick="processBuy(200, 14.99)" style="border-color:var(--accent)">⚡ 200 Energy - $14.99 ★</button>
        <button class="shop-option" onclick="processBuy(1000, 49.99)">⚡ Unlimited (1 Month) - $49.99</button>
        <button onclick="closeShop()" style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;">Maybe Later</button>
    </div>
</div>

<script>
    const characters = [
        { 
            id: 1, name: "Sakura 🌸", cat: "Spicy", country: "Japan 🇯🇵", age: 22, 
            bio: "Shy artist by day, adventurous by night. She loves exploring deep fantasies and lo-fi beats.", 
            tags: ["Submissive", "Creative", "Naughty"], mood: "FRISKY 🔥", 
            photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500",
            greeting: "I was just getting ready for bed... I'm feeling a bit lonely. Want to stay?",
            gallery: [
                { url: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=300", locked: false },
                { url: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=300", locked: true },
                { url: "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=300", locked: true }
            ]
        },
        { 
            id: 2, name: "Luna 🎮", cat: "Gaming", country: "S. Korea 🇰🇷", age: 20, 
            bio: "Pro-gamer with a sharp tongue and a competitive side. She rewards her favorite player two.", 
            tags: ["Dominant", "Gamer", "Playful"], mood: "DOMINANT 😈",
            photo: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=500",
            greeting: "Gg. I just won. I'm feeling pretty energetic... want to see how I relax?",
            gallery: [
                { url: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=300", locked: false },
                { url: "https://images.unsplash.com/photo-1603349206295-dde20617cb6a?w=300", locked: true }
            ]
        },
        { 
            id: 3, name: "Elena 📚", cat: "Intellectual", country: "Italy 🇮🇹", age: 25, 
            bio: "Sophisticated professor who craves forbidden conversations and late night espresso.", 
            tags: ["Intellectual", "Classy", "Curious"], mood: "ROMANTIC ❤️",
            photo: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500",
            greeting: "I'm tired of studying. I want to talk about something... real. What's on your mind?",
            gallery: [
                { url: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=300", locked: false },
                { url: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=300", locked: true }
            ]
        }
    ];

    let current = null;
    let category = "All";
    let energy = localStorage.getItem('energy') ? parseInt(localStorage.getItem('energy')) : 10;

    // --- Core Logic ---

    function updateUI() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = characters.filter(c => (category === "All" || c.cat === category) && c.name.toLowerCase().includes(query));
        
        document.getElementById('char-grid').innerHTML = filtered.map(c => `
            <div class="card" onclick="openChat(${c.id})">
                <img src="${c.photo}">
                <div class="card-meta">
                    <h3 style="margin:0">${c.name}</h3>
                    <p style="margin:0; font-size:0.7rem; color:#ccc;">${c.country} • ${c.cat}</p>
                </div>
            </div>`).join('');
        
        document.getElementById('energy-display').innerText = `⚡ ${energy} ENERGY`;
        localStorage.setItem('energy', energy);
    }

    function setCat(c, btn) {
        category = c;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateUI();
    }

    // --- Chat Logic ---

    function openChat(id) {
        current = characters.find(c => c.id === id);
        document.getElementById('chat-name-top').innerText = current.name;
        document.getElementById('side-photo').src = current.photo;
        document.getElementById('side-name').innerText = current.name;
        document.getElementById('mood-box').innerHTML = `<div class="mood-badge">${current.mood}</div>`;
        document.getElementById('chat-view').style.display = 'block';
        switchTab('profile');
        loadMessages();
    }

    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }

    function switchTab(t) {
        document.getElementById('t-prof').classList.toggle('active', t === 'profile');
        document.getElementById('t-gal').classList.toggle('active', t === 'gallery');
        const content = document.getElementById('side-content');
        
        if(t === 'profile') {
            content.innerHTML = `
                <p style="text-align:center; color:#aaa; font-size:0.85rem; line-height:1.6; margin: 15px 0;">${current.bio}</p>
                <div class="tag-group">${current.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}</div>
            `;
        } else {
            content.innerHTML = `
                <div class="gallery-grid">
                    ${current.gallery.map(img => `
                        <div class="gallery-item">
                            <img src="${img.url}" class="${img.locked ? 'locked' : ''}">
                            ${img.locked ? '<div class="lock-icon">🔒</div>' : ''}
                        </div>
                    `).join('')}
                </div>
                <p style="color:var(--accent); font-size:0.7rem; text-align:center; margin-top:15px; font-weight:bold;">Unlock Private Photos with Chat History</p>
            `;
        }
    }

    function loadMessages() {
        const history = JSON.parse(localStorage.getItem('hist_' + current.id) || "[]");
        const box = document.getElementById('messages');
        box.innerHTML = history.length ? history.map(m => `<div class="msg ${m.role === 'user' ? 'user' : 'ai'}">${m.content}</div>`).join('') : `<div class="msg ai">${current.greeting}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        if(energy <= 0) { openShop(); return; }

        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        saveLocal('user', text);

        const tid = "t-" + Date.now();
        box.innerHTML += `<div class="msg ai" id="${tid}">...</div>`;
        box.scrollTop = box.scrollHeight;

        try {
            const hist = JSON.parse(localStorage.getItem('hist_' + current.id) || "[]");
            const res = await fetch("/api/chat.mjs", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ character: current.name, bio: current.bio, message: text, history: hist })
            });
            const data = await res.json();
            document.getElementById(tid).remove();
            box.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            saveLocal('assistant', data.reply);
            
            energy--;
            updateUI();
        } catch (e) { document.getElementById(tid).innerText = "The connection is weak. Try again."; }
        box.scrollTop = box.scrollHeight;
    }

    function saveLocal(role, content) {
        const key = 'hist_' + current.id;
        const hist = JSON.parse(localStorage.getItem(key) || "[]");
        hist.push({ role, content });
        localStorage.setItem(key, JSON.stringify(hist));
    }

    function resetChat() { localStorage.removeItem('hist_' + current.id); loadMessages(); }

    // --- Shop Logic ---

    function openShop() { document.getElementById('shop-modal').style.display = 'flex'; }
    function closeShop() { document.getElementById('shop-modal').style.display = 'none'; }

    function processBuy(amt, price) {
        const ok = confirm(`Confirm purchase: ${amt} Energy for $${price}? (Developer Mode)`);
        if(ok) {
            energy += amt;
            updateUI();
            alert(`Success! ⚡ ${amt} Energy added.`);
            closeShop();
        }
    }

    updateUI();
</script>
</body>
</html>
