<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub.AI | Final Empire Edition</title>
    <style>
        :root { --bg: #05040a; --card: #0f0d1f; --text: #ffffff; --accent: #f80759; --border: #1f1b3d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Header & Search Styles */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5, 4, 10, 0.9); backdrop-filter: blur(15px); position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.2rem; cursor: pointer; }
        
        .search-bar { background: #16142e; border: 1px solid var(--border); color: white; padding: 8px 15px; border-radius: 20px; outline: none; width: 200px; transition: 0.3s; font-size: 0.8rem; }
        .search-bar:focus { border-color: var(--accent); width: 250px; }

        .energy-pill { background: rgba(248, 7, 89, 0.1); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: var(--accent); font-weight: bold; }
        
        /* Grid Styles */
        .main-content { padding: 25px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; height: 320px; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Menu & UI Elements */
        .menu-dots { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; color: white; cursor: pointer; }
        .dropdown { display: none; position: absolute; top: 45px; right: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; z-index: 20; width: 110px; }
        .dropdown button { width: 100%; padding: 10px; background: none; border: none; color: white; text-align: left; cursor: pointer; font-size: 0.75rem; border-bottom: 1px solid var(--border); }
        .dropdown button:hover { background: var(--accent); }

        /* Chat View */
        #chat-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; }
        .chat-layout { display: flex; height: 100%; max-width: 1400px; margin: 0 auto; width: 100%; }
        .sidebar { width: 380px; border-right: 1px solid var(--border); padding: 40px 30px; overflow-y: auto; background: var(--card); display: flex; flex-direction: column; align-items: center; }
        .big-photo { width: 260px; height: 260px; border-radius: 25px; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 20px; }
        .chat-main { flex: 1; max-width: 500px; display: flex; flex-direction: column; background: #080712; border-right: 1px solid var(--border); border-left: 1px solid var(--border); margin: 0 auto; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; }
        .ai { background: var(--card); align-self: flex-start; }
        .user { background: var(--accent); align-self: flex-end; }

        /* Modal */
        #admin-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9000; align-items:center; justify-content:center; backdrop-filter: blur(5px); }
        .modal-card { background: var(--card); padding: 30px; border-radius: 20px; width: 380px; border: 1px solid var(--border); }
        .admin-input { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 10px; margin: 8px 0; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">CHATHUB.AI</div>
    <div style="display:flex; align-items:center; gap:15px;">
        <input type="text" id="charSearch" class="search-bar" placeholder="Search characters..." onkeyup="filterChars()">
        <button onclick="openAdmin()" style="background:var(--accent); border:none; color:white; padding:8px 15px; border-radius:20px; cursor:pointer; font-weight:bold; font-size:0.75rem;">+ NEW GIRL</button>
        <div class="energy-pill" id="energy-txt">⚡ 10 ENERGY</div>
    </div>
</header>

<div class="main-content">
    <div class="grid" id="char-grid"></div>
</div>

<div id="admin-modal">
    <div class="modal-card">
        <h2 style="color:var(--accent); margin-top:0;">New Character</h2>
        <input type="text" id="admName" class="admin-input" placeholder="Name">
        <input type="text" id="admMood" class="admin-input" placeholder="Vibe (e.g. 😈 Naughty)">
        <input type="text" id="admImg" class="admin-input" placeholder="Photo URL">
        <textarea id="admBio" class="admin-input" placeholder="Bio" rows="4"></textarea>
        <button onclick="saveCharacter()" style="background:var(--accent); color:white; border:none; padding:12px; width:100%; border-radius:10px; cursor:pointer; font-weight:bold;">SAVE</button>
        <button onclick="closeAdmin()" style="background:none; border:none; color:#555; width:100%; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="chat-view">
    <div class="chat-layout">
        <div class="sidebar">
            <img id="side-photo" class="big-photo">
            <h2 id="side-name" style="margin:0"></h2>
            <div id="side-mood" style="color:var(--accent); font-weight:bold; margin:10px 0;"></div>
            <div id="side-content" style="color:#aaa; font-size:0.85rem; text-align:center;"></div>
        </div>
        <div class="chat-main">
            <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; align-items:center;">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">← Back</button>
            </div>
            <div id="messages"></div>
            <div style="padding:20px; border-top:1px solid var(--border); display:flex; gap:10px;">
                <input type="text" id="userInput" placeholder="Type a message..." style="flex:1; background:#16142e; border:1px solid var(--border); padding:12px; color:white; border-radius:25px; outline:none;">
                <button onclick="send()" style="background:var(--accent); border:none; color:white; width:45px; height:45px; border-radius:50%; cursor:pointer;">➔</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. EXTENDED CHARACTER LIST
    let characters = JSON.parse(localStorage.getItem('candy_empire_db')) || [
        { id: 1, name: "Sakura 🌸", mood: "FRISKY 🔥", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600", bio: "The artist who loves forbidden sketches." },
        { id: 2, name: "Elena 🍷", mood: "DOMINANT 👑", photo: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=600", bio: "A CEO who always gets what she wants." },
        { id: 3, name: "Nyx 🌙", mood: "MYSTERIOUS 🔮", photo: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=600", bio: "Goth vibes and late night secrets." },
        { id: 4, name: "Bambi 🍭", mood: "PLAYFUL ✨", photo: "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=600", bio: "Sweet, but with a wild side." },
        { id: 5, name: "Seraphina ⚔️", mood: "AGGRESSIVE 🔥", photo: "https://images.unsplash.com/photo-1502673530728-f79b4cab31b1?w=600", bio: "A warrior who plays for keeps." }
    ];

    let energy = localStorage.getItem('energy') || 10;
    let current = null;

    // 2. SEARCH FUNCTION
    function filterChars() {
        let searchTerm = document.getElementById('charSearch').value.toLowerCase();
        let cards = document.getElementsByClassName('card');

        for (let card of cards) {
            let name = card.getAttribute('data-name').toLowerCase();
            card.style.display = name.includes(searchTerm) ? "block" : "none";
        }
    }

    // 3. RENDER GRID
    function renderGrid() {
        const grid = document.getElementById('char-grid');
        grid.innerHTML = characters.map(c => `
            <div class="card" data-name="${c.name}" onclick="openChat(${c.id})">
                <img src="${c.photo}">
                <div style="position:absolute; bottom:0; width:100%; padding:15px; background:linear-gradient(transparent, #000);">
                    <b>${c.name}</b><br><small style="color:var(--accent);">${c.mood}</small>
                </div>
            </div>`).join('');
    }

    // 4. CORE FUNCTIONS
    function openAdmin() { document.getElementById('admin-modal').style.display='flex'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display='none'; }
    
    function saveCharacter() {
        const data = {
            id: Date.now(),
            name: document.getElementById('admName').value,
            mood: document.getElementById('admMood').value,
            photo: document.getElementById('admImg').value,
            bio: document.getElementById('admBio').value
        };
        characters.push(data);
        localStorage.setItem('candy_empire_db', JSON.stringify(characters));
        renderGrid();
        closeAdmin();
    }

    function openChat(id) {
        current = characters.find(c => c.id == id);
        document.getElementById('side-photo').src = current.photo;
        document.getElementById('side-name').innerText = current.name;
        document.getElementById('side-mood').innerText = current.mood;
        document.getElementById('side-content').innerText = current.bio;
        document.getElementById('chat-view').style.display = 'block';
        document.getElementById('messages').innerHTML = `<div class="msg ai">Missed me?</div>`;
    }

    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text || energy <= 0) return;

        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        energy--;
        updateEnergy();
        
        setTimeout(() => {
            box.innerHTML += `<div class="msg ai">That's interesting... tell me more.</div>`;
            box.scrollTop = box.scrollHeight;
        }, 1000);
    }

    function updateEnergy() { 
        document.getElementById('energy-txt').innerText = `⚡ ${energy} ENERGY`; 
        localStorage.setItem('energy', energy); 
    }

    // Initialize
    renderGrid();
    updateEnergy();
</script>
</body>
</html>
