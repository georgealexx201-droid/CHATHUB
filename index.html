<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub Pro | Owner Edition</title>
    <style>
        :root { --bg: #05040a; --card: #0f0d1f; --text: #ffffff; --accent: #f80759; --border: #1f1b3d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Header */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5, 4, 10, 0.9); backdrop-filter: blur(15px); position: sticky; top:0; z-index:100; }
        .logo { font-weight: 900; background: linear-gradient(45deg, #f80759, #bc4e9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.2rem; cursor: pointer; }
        .energy-pill { background: rgba(248, 7, 89, 0.1); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: var(--accent); font-weight: bold; }

        /* Grid & Cards */
        .main-content { padding: 25px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; height: 320px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* The 3-Dots Menu */
        .menu-dots { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; color: white; font-weight: bold; }
        .menu-dots:hover { background: var(--accent); }
        
        .dropdown { display: none; position: absolute; top: 45px; right: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; z-index: 20; width: 120px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .dropdown button { width: 100%; padding: 10px; background: none; border: none; color: white; text-align: left; cursor: pointer; font-size: 0.8rem; border-bottom: 1px solid var(--border); }
        .dropdown button:hover { background: var(--accent); }

        /* Chat Layout */
        #chat-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; }
        .chat-layout { display: flex; height: 100%; max-width: 1400px; margin: 0 auto; }
        .sidebar { width: 350px; border-right: 1px solid var(--border); padding: 30px; overflow-y: auto; background: var(--card); }
        .chat-main { flex: 1; max-width: 500px; display: flex; flex-direction: column; background: #080712; border-right: 1px solid var(--border); }
        
        /* Modals */
        #admin-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9000; align-items:center; justify-content:center; }
        .form-box { background: var(--card); padding: 30px; border-radius: 15px; width: 400px; border: 1px solid var(--border); }
        .form-box input, .form-box textarea { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 5px; }
        
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; margin-bottom: 10px; }
        .ai { background: var(--card); align-self: flex-start; }
        .user { background: var(--accent); align-self: flex-end; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">CHATHUB.AI</div>
    <div style="display:flex; align-items:center; gap:15px;">
        <button onclick="openAdmin()" style="background:var(--accent); border:none; color:white; padding:5px 15px; border-radius:15px; cursor:pointer; font-size:0.8rem; font-weight:bold;">+ ADD NEW</button>
        <div class="energy-pill" id="energy-txt">⚡ 10 ENERGY</div>
    </div>
</header>

<div class="main-content">
    <div class="grid" id="char-grid"></div>
</div>

<div id="admin-modal">
    <div class="form-box">
        <h2 id="modal-title" style="color:var(--accent); margin-top:0;">Add Character</h2>
        <input type="hidden" id="edit-id">
        <input type="text" id="admName" placeholder="Name (e.g. Mia)">
        <input type="text" id="admMood" placeholder="Mood (e.g. 🔥 Frisky)">
        <input type="text" id="admImg" placeholder="Main Photo URL">
        <textarea id="admBio" placeholder="Bio & Character Instructions" rows="4"></textarea>
        <button onclick="saveCharacter()" style="background:var(--accent); color:white; border:none; padding:12px; width:100%; border-radius:8px; cursor:pointer; font-weight:bold;">SAVE CHARACTER</button>
        <button onclick="closeAdmin()" style="background:none; border:none; color:#555; width:100%; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="chat-view">
    <div class="chat-layout">
        <div class="sidebar">
            <img id="side-photo" style="width:100%; border-radius:15px; border:2px solid var(--accent);">
            <h2 id="side-name"></h2>
            <div id="side-mood" style="color:var(--accent); font-weight:bold; margin-bottom:15px;"></div>
            <p id="side-bio" style="color:#aaa; font-size:0.9rem; line-height:1.6;"></p>
            <button onclick="closeChat()" style="background:var(--border); color:white; border:none; padding:10px; width:100%; border-radius:10px; cursor:pointer; margin-top:20px;">BACK TO GRID</button>
        </div>
        <div class="chat-main">
            <div id="messages"></div>
            <div style="padding:20px; border-top:1px solid var(--border); display:flex; gap:10px;">
                <input type="text" id="userInput" placeholder="Send a message..." style="flex:1; background:#111; border:1px solid var(--border); padding:12px; color:white; border-radius:25px; outline:none;">
                <button onclick="send()" style="background:var(--accent); border:none; color:white; width:45px; height:45px; border-radius:50%; cursor:pointer;">➔</button>
            </div>
        </div>
    </div>
</div>

<script>
    let characters = JSON.parse(localStorage.getItem('my_empire')) || [
        { id: 1, name: "Sakura 🌸", mood: "FRISKY 🔥", photo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600", bio: "The artist who loves forbidden sketches." }
    ];
    let energy = localStorage.getItem('energy') || 10;
    let current = null;

    function renderGrid() {
        const grid = document.getElementById('char-grid');
        grid.innerHTML = characters.map(c => `
            <div class="card" onclick="openChat(${c.id})">
                <div class="menu-dots" onclick="toggleMenu(event, ${c.id})">⋮</div>
                <div class="dropdown" id="drop-${c.id}">
                    <button onclick="editChar(event, ${c.id})">Edit</button>
                    <button onclick="deleteChar(event, ${c.id})" style="color:#ff4444;">Delete</button>
                </div>
                <img src="${c.photo}">
                <div style="position:absolute; bottom:0; width:100%; padding:15px; background:linear-gradient(transparent, #000);">
                    <b style="font-size:1.1rem;">${c.name}</b><br>
                    <small style="color:var(--accent); font-weight:bold;">${c.mood}</small>
                </div>
            </div>
        `).join('');
    }

    function toggleMenu(e, id) {
        e.stopPropagation();
        const drop = document.getElementById('drop-' + id);
        const isOpen = drop.style.display === 'block';
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        drop.style.display = isOpen ? 'none' : 'block';
    }

    // Admin Functions
    function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; resetForm(); }

    function resetForm() {
        document.getElementById('modal-title').innerText = "Add Character";
        document.getElementById('edit-id').value = "";
        document.getElementById('admName').value = "";
        document.getElementById('admMood').value = "";
        document.getElementById('admImg').value = "";
        document.getElementById('admBio').value = "";
    }

    function saveCharacter() {
        const id = document.getElementById('edit-id').value;
        const data = {
            id: id ? parseInt(id) : Date.now(),
            name: document.getElementById('admName').value,
            mood: document.getElementById('admMood').value,
            photo: document.getElementById('admImg').value,
            bio: document.getElementById('admBio').value
        };

        if(id) {
            const index = characters.findIndex(c => c.id == id);
            characters[index] = data;
        } else {
            characters.push(data);
        }

        localStorage.setItem('my_empire', JSON.stringify(characters));
        renderGrid();
        closeAdmin();
    }

    function editChar(e, id) {
        e.stopPropagation();
        const c = characters.find(char => char.id == id);
        document.getElementById('modal-title').innerText = "Edit Character";
        document.getElementById('edit-id').value = c.id;
        document.getElementById('admName').value = c.name;
        document.getElementById('admMood').value = c.mood;
        document.getElementById('admImg').value = c.photo;
        document.getElementById('admBio').value = c.bio;
        openAdmin();
        document.getElementById('drop-' + id).style.display = 'none';
    }

    function deleteChar(e, id) {
        e.stopPropagation();
        if(confirm("Are you sure you want to delete this character?")) {
            characters = characters.filter(c => c.id != id);
            localStorage.setItem('my_empire', JSON.stringify(characters));
            renderGrid();
        }
    }

    // Chat Functions
    function openChat(id) {
        current = characters.find(c => c.id == id);
        document.getElementById('side-photo').src = current.photo;
        document.getElementById('side-name').innerText = current.name;
        document.getElementById('side-mood').innerText = current.mood;
        document.getElementById('side-bio').innerText = current.bio;
        document.getElementById('chat-view').style.display = 'block';
        loadMessages();
    }

    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        const box = document.getElementById('messages');
        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch("/api/chat.mjs", {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ character: current.name, message: text, bio: current.bio, history: [] })
            });
            const data = await res.json();
            box.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            box.scrollTop = box.scrollHeight;
            energy--;
            document.getElementById('energy-txt').innerText = `⚡ ${energy} ENERGY`;
        } catch (e) { console.error(e); }
    }

    function loadMessages() {
        document.getElementById('messages').innerHTML = `<div class="msg ai">Hello... I've been waiting for you.</div>`;
    }

    // Close dropdowns on click
    window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
    document.getElementById('userInput').addEventListener('keydown', (e) => { if(e.key==='Enter') send(); });

    renderGrid();
</script>
</body>
</html>
